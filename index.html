<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>러셀 테스트 이동일지 작성</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; text-align: center; margin: 20px; background-color: #f4f7f6; }
        h1 { color: #336699; font-size: 24px; }
        form {
            display: inline-block; text-align: left; border: 1px solid #e0e0e0;
            padding: 25px; width: 100%; max-width: 500px; box-sizing: border-box;
            background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        select, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box;
            font-size: 16px; border-radius: 6px; border: 1px solid #ccc; background-color: #fafafa;
        }
        button {
            padding: 12px 20px; background-color: #336699; color: #fff; font-weight: bold; font-size: 16px;
            border: none; cursor: pointer; width: 100%; border-radius: 6px; transition: background-color 0.2s;
        }
        button:hover { background-color: #28597b; }
        
        /* 테이블 스타일 */
        table { margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 800px; background-color: #fff; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        thead { background-color: #336699; color: white; }

        /* 팝업 및 레이아웃 */
        .popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 95%; max-width: 600px; 
            background-color: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000; padding: 20px; box-sizing: border-box;
        }
        .popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); z-index: 999;
        }

        /* ✅ 좌석표 핵심 디자인 (이미지 재현) */
        .seat-map-container {
            width: 100%;
            max-height: 500px;
            overflow-y: auto;
            margin-top: 15px;
            border: 1px solid #ddd;
            padding: 15px;
            background: #ffffff;
            border-radius: 8px;
        }
        .seat-grid {
            display: grid;
            /* 좌석 2열 - 통로 - 좌석 2열 - 통로 - 좌석 2열 구조 */
            grid-template-columns: repeat(2, 45px) 15px repeat(2, 45px) 15px repeat(2, 45px);
            gap: 4px 2px;
            justify-content: center;
            width: max-content;
            margin: 0 auto;
        }
        .seat-cell {
            width: 45px; height: 28px; font-size: 10px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 2px; box-sizing: border-box;
        }
        .seat-cell.seat {
            background-color: #fff; border: 1px solid #ccc; cursor: pointer; font-weight: bold;
        }
        .seat-cell.seat:hover { background-color: #e3effa; border-color: #336699; }
        .seat-cell.seat.selected { background-color: #336699; color: white; border-color: #1a3a5c; }
        
        /* 중앙 회색 통로 */
        .seat-cell.aisle {
            background-color: #666; /* 이미지의 짙은 회색 */
            width: 12px; margin: 0 2px; border: none; pointer-events: none;
        }
        .seat-cell.empty { background-color: transparent; border: none; }
        .seat-cell.door { 
            background-color: #d9d9d9; border: 1px solid #999; font-weight: bold; font-size: 11px; 
        }
        .seat-cell.title-text {
            grid-column: 1 / -1; font-size: 16px; font-weight: 900; height: 40px; color: #333;
        }
        
        .score { display: none; }
        .error { color: red; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>러셀 이동일지&교육점수 작성</h1>
    <button id="resetButton" onclick="resetTable()" style="width:auto; margin-bottom:10px;">테이블 초기화</button>

    <form id="moveForm">
        <label>관 (본인):</label>
        <select id="building" required>
            <option value="">선택하세요</option>
            <option value="4-1관">4-1관</option><option value="7-1관">7-1관</option>
        </select>

        <label>좌석번호 (본인):</label>
        <div style="display: flex; gap: 5px;">
            <select id="seatNumber" required><option value="">알파벳</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="F">F</option><option value="G">G</option></select>
            <select id="seatNumber2" required><option value="">번호</option><option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option></select>
        </div>

        <label>복귀교시:</label>
        <select id="returnTime" required>
            <option value="">선택하세요</option>
            <option value="1">1교시</option><option value="2">2교시</option><option value="9">9교시</option><option value="10">10교시</option><option value="복귀안함">복귀안함</option>
        </select>

        <label>이동사유:</label>
        <select id="reason" required>
            <option value="">선택하세요</option>
            <optgroup label="일반">
                <option value="화장실/정수기">화장실/정수기</option><option value="기타">기타</option>
            </optgroup>
            <optgroup label="심야자습">
                <option value="심야자습 신청">심야자습 신청</option><option value="심야자습 취소">심야자습 취소</option>
            </optgroup>
        </select>

        <div id="scoreDiv" class="score">
            <label>점수 (취침은 기본 1점):</label>
            <select id="score"><option value="1">1점</option><option value="2">2점</option><option value="3">3점</option></select>
        </div>

        <textarea id="otherReason" placeholder="기타 사유 입력" style="display:none; height: 60px;"></textarea>
        <button type="submit">제출</button>
    </form>

    <div id="result">
        <table id="moveList">
            <thead><tr><th>관</th><th>좌석</th><th>복귀</th><th>사유</th><th>시간</th><th>점수</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="popupOverlay" class="popup-overlay"></div>
    <div id="popup" class="popup">
        <h2>🌙 좌석 선택 (이미지 방식)</h2>
        <div style="margin-bottom: 10px; text-align: left;">
            <select id="modalBuilding" style="width: 150px; padding: 5px;">
                <option value="">관 선택</option>
                <option value="7-1관">7-1관</option>
            </select>
            <span id="selectedTargetText" style="font-weight:bold; color:#d9534f; margin-left:10px;">좌석을 선택하세요.</span>
        </div>
        <div id="seatMapContainer" class="seat-map-container">
            <div id="seatGrid" class="seat-grid"></div>
        </div>
        <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
            <button id="popupSubmitButton" style="width:120px;">최종 제출</button>
            <button id="popupCancelButton" style="width:120px; background:#aaa;">취소</button>
        </div>
    </div>

    <script>
        let moveList = [];
        let selectedTargetSeat = "";
        
        // 7-1관 데이터 (이미지의 세로 구조 반영)
        const seatData = {
            "7-1관": [
                ["1 페이지", "", "", "", "", "", "", ""], // 타이틀
                ["7-1A01", "7-1B01", "", "7-1C01", "7-1D01", "", "7-1F01", "7-1G01"],
                ["7-1A02", "7-1B02", "", "7-1C02", "7-1D02", "", "7-1F02", "7-1G02"],
                ["7-1A03", "7-1B03", "", "7-1C03", "7-1D03", "", "7-1F03", "7-1G03"],
                ["", "", "", "", "", "", "", "출입문"], // 통로층
                ["7-1A21", "7-1B21", "", "7-1C21", "7-1D21", "", "7-1F21", "7-1G21"],
                ["7-1A22", "7-1B22", "", "7-1C22", "7-1D22", "", "7-1F22", "7-1G22"]
            ]
        };

        // 좌석 그리기 로직 (핵심)
        document.getElementById("modalBuilding").addEventListener("change", function() {
            const building = this.value;
            const grid = document.getElementById("seatGrid");
            grid.innerHTML = "";
            selectedTargetSeat = "";

            if (!building || !seatData[building]) return;

            seatData[building].forEach((row) => {
                row.forEach((cell, colIndex) => {
                    const div = document.createElement("div");
                    div.classList.add("seat-cell");
                    const val = cell.trim();

                    // ✅ 이미지의 회색 통로 위치 설정 (3번째, 6번째 열)
                    if (colIndex === 2 || colIndex === 5) {
                        div.classList.add("aisle");
                    } else if (val === "") {
                        div.classList.add("empty");
                    } else if (val.includes("페이지")) {
                        div.classList.add("title-text");
                        div.textContent = val;
                    } else if (val === "출입문") {
                        div.classList.add("door");
                        div.textContent = "🚪 문";
                    } else {
                        div.classList.add("seat");
                        div.textContent = val;
                        div.onclick = () => {
                            document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
                            div.classList.add('selected');
                            selectedTargetSeat = val;
                            document.getElementById("selectedTargetText").textContent = "선택: " + val;
                        };
                    }
                    grid.appendChild(div);
                });
            });
        });

        // 제출 로직
        document.getElementById("moveForm").onsubmit = (e) => {
            e.preventDefault();
            const reason = document.getElementById("reason").value;
            if (reason.includes("심야자습")) {
                document.getElementById("popupOverlay").style.display = "block";
                document.getElementById("popup").style.display = "block";
            } else {
                submitFinal();
            }
        };

        function submitFinal() {
            const data = {
                building: document.getElementById("building").value,
                seat: document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value,
                reason: document.getElementById("reason").value,
                time: new Date().toLocaleTimeString(),
                score: document.getElementById("score").value || 0
            };
            // Apps Script 연동 부분
            console.log("제출 데이터:", data);
            alert("제출되었습니다!");
            location.reload();
        }

        document.getElementById("popupCancelButton").onclick = () => {
            document.getElementById("popup").style.display = "none";
            document.getElementById("popupOverlay").style.display = "none";
        };

        document.getElementById("popupSubmitButton").onclick = () => {
            if(!selectedTargetSeat) return alert("좌석을 선택하세요!");
            submitFinal();
        };
    </script>
</body>
</html>
