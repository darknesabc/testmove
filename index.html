<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>러셀 테스트 이동일지 작성</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; text-align: center; margin: 20px; background-color: #f4f7f6; }
        h1 { color: #336699; font-size: 24px; }
        form {
            display: inline-block; text-align: left; border: 1px solid #e0e0e0;
            padding: 25px; width: 100%; max-width: 500px; box-sizing: border-box;
            background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        select, textarea, input {
            width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box;
            font-size: 16px; border-radius: 6px; border: 1px solid #ccc; background-color: #fafafa;
        }
        select:focus, textarea:focus, input:focus { outline: none; border-color: #336699; background-color: #fff; }
        button {
            padding: 12px 20px; background-color: #336699; color: #fff; font-weight: bold; font-size: 16px;
            border: none; cursor: pointer; width: 100%; border-radius: 6px; transition: background-color 0.2s;
        }
        button:hover { background-color: #28597b; }
        #resetButton {
            margin: 10px 0 20px 0; float: left; width: auto; padding: 8px 16px;
            background-color: #999; cursor: pointer; border-radius: 6px; font-size: 14px;
        }
        #resetButton:hover { background-color: #777; }
        table {
            margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 800px;
            border-radius: 8px; overflow: hidden; background-color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        thead { background-color: #336699; color: white; font-weight: bold; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #f1f5f9; }
        .score { display: none; }

        #counselingInfo {
            display: none; background-color: #fff9db; border: 1px solid #fab005;
            padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center;
        }
        #counselingInfo p { margin: 5px 0; font-size: 15px; }

        .popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 95%; max-width: 850px; 
            background-color: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 1000; padding: 25px; box-sizing: border-box;
        }
        .popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); z-index: 999;
        }
        .popup-content { text-align: center; }
        .popup h2 { margin-top: 0; margin-bottom: 10px; color: #336699; }
        .popup-buttons { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .popup button { width: auto; min-width: 100px; }
        .cancel-btn { background-color: #aaa !important; }
        .cancel-btn:hover { background-color: #888 !important; }

        #finalConfirmPopup { max-width: 400px; z-index: 1100; border-top: 5px solid #336699; }
        #counselingPopup { max-width: 450px; z-index: 1100; border-top: 5px solid #fab005; }
        .confirm-info-box { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #eee; }
        .confirm-info-box p { margin: 8px 0; font-size: 15px; }

        .seat-map-container {
            width: 100%; max-height: 480px; overflow: auto; 
            margin-top: 15px; border: 1px solid #e0e0e0; padding: 20px;
            background: #f8f9fa; border-radius: 8px; display: none; box-sizing: border-box;
        }
        .seat-grid { display: grid; gap: 2px 4px; justify-content: center; width: max-content; margin: 0 auto; }
        .seat-cell { height: 24px; font-size: 11px; text-align: center; display: flex; align-items: center; justify-content: center; user-select: none; box-sizing: border-box; border-radius: 3px; transition: transform 0.1s, box-shadow 0.1s; }
        .seat-cell.seat { background-color: #ffffff; border: 1px solid #b3bccc; cursor: pointer; color: #333; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .seat-cell.seat:hover { background-color: #e3effa; border-color: #336699; transform: translateY(-1px); }
        .seat-cell.seat.selected { background-color: #336699; color: white; border-color: #1a3a5c; box-shadow: 0 0 8px rgba(51, 102, 153, 0.6); }
        .seat-cell.seat.reserved { background-color: #ffeded; color: #d9534f; border-color: #ffcccc; cursor: not-allowed; pointer-events: none; text-decoration: line-through; }
        .seat-cell.seat.disabled { background-color: #f2f2f2; color: #c0c0c0; border-color: #e0e0e0; cursor: not-allowed; box-shadow: none; pointer-events: none; }
        .seat-cell.aisle { background-color: #7a7a7a; border-radius: 0; border: none; width: 100%; height: 100%; transform: scaleY(1.2); z-index: 1; pointer-events: none; }
        .seat-cell.empty { background-color: transparent; border: none; padding: 0; pointer-events: none; }
        .seat-cell.title-text { color: #336699; font-size: 18px; font-weight: 900; letter-spacing: 2px; justify-content: center; }
        .seat-cell.door { background-color: #e2f0d9; color: #274e13; border: 1px dashed #93c47d; border-radius: 4px; justify-content: center; font-weight: bold; font-size: 11px; }

        @media (max-width: 768px) { form { padding: 15px; } button { width: 100%; } table, th, td { font-size: 14px; } select, textarea { padding: 14px; font-size: 16px; } }
    </style>
</head>
<body>
    <h1>러셀 이동일지&교육점수 작성</h1>
    <button id="resetButton" onclick="resetTable()">테이블 초기화</button>

    <form id="moveForm">
        <label for="building">관 (본인):</label>
        <select id="building" required>
            <option value="">선택하세요</option>
            <option value="4-1관">4-1관</option><option value="4-2관">4-2관</option>
            <option value="4-3관">4-3관</option><option value="4-4관">4-4관</option>
            <option value="4-5관">4-5관</option>
        </select>

        <label for="seatNumber">좌석번호 (본인):</label>
        <div style="display: flex; gap: 10px;">
            <select id="seatNumber" required style="margin-bottom: 0;">
                <option value="">알파벳</option>
                <optgroup label="A~I">
                    <option value="A">A</option><option value="B">B</option>
                    <option value="C">C</option><option value="D">D</option>
                    <option value="F">F</option><option value="G">G</option>
                    <option value="H">H</option><option value="I">I</option>
                </optgroup>
            </select>
            <select id="seatNumber2" required style="margin-bottom: 0;">
                <option value="">번호</option>
                <optgroup label="1~40">
                    <option value="01">01</option><option value="02">02</option><option value="03">03</option>
                    <option value="04">04</option><option value="05">05</option><option value="06">06</option>
                    <option value="07">07</option><option value="08">08</option><option value="09">09</option>
                    <option value="10">10</option><option value="11">11</option>
                </optgroup>
            </select>
        </div>
        <div style="margin-bottom: 15px;"></div>

        <div id="counselingInfo">
            <p>👤 <b>이름:</b> <span id="infoStudentName">-</span></p>
            <p>👨‍🏫 <b>담당 담임:</b> <span id="infoTeacherName">-</span></p>
        </div>

        <label for="reason">이동사유:</label>
        <select id="reason" required>
            <option value="">선택하세요</option>
            <optgroup label="상담 관리">
                <option value="상담 신청">상담 신청</option>
                <option value="상담 취소">상담 취소</option>
            </optgroup>
            <optgroup label="일반 이동">
                <option value="화장실/정수기">화장실/정수기</option><option value="튜터 질의응답">튜터 질의응답</option>
                <option value="외부 학원/과외/보충">외부 학원/과외/보충</option><option value="자료수령">자료수령</option>
                <option value="가족 행사">가족 행사</option><option value="병원">병원</option>
                <option value="식사">식사</option><option value="기타">기타</option>
                <option value="조퇴(컨디션난조)">조퇴(컨디션난조)</option>
            </optgroup>
            <optgroup label="심야자습">
                <option value="심야자습 신청">심야자습 신청</option><option value="심야자습 취소">심야자습 취소</option>
            </optgroup>
            <optgroup label="규정 위반/지도">
                <option value="지각">지각</option><option value="입/퇴실 미준수">입/퇴실 미준수</option>
                <option value="핸드폰 미제출">핸드폰 미제출</option><option value="전자기기 무단사용">전자기기 무단사용</option>
                <option value="핸드폰 무단사용">핸드폰 무단사용</option><option value="무단이탈">무단이탈</option>
                <option value="타층/타관 무단출입">타층/타관 무단출입</option><option value="핸드폰/Wifi 무단반입">핸드폰/Wifi 무단반입</option>
                <option value="무단결석">무단결석</option><option value="원내대화">원내대화</option>
                <option value="무단지각">무단지각</option><option value="취침강제하원">취침강제하원</option>
                <option value="음식물섭취">음식물섭취</option>
            </optgroup>
        </select>

        <label for="returnTime">복귀교시:</label>
        <select id="returnTime" required>
            <option value="">사유를 먼저 선택하세요</option>
        </select>

        <div id="scoreDiv" class="score">
            <label for="score">점수 (1~10점):</label>
            <select id="score">
                <option value="1">1점</option><option value="2">2점</option><option value="3">3점</option>
                <option value="4">4점</option><option value="5">5점</option><option value="6">6점</option>
                <option value="7">7점</option><option value="8">8점</option><option value="9">9점</option>
                <option value="10">10점</option>
            </select>
        </div>
        <label for="otherReason" id="otherReasonLabel" style="display:none;">기타 사유:</label>
        <textarea id="otherReason" placeholder="내용을 입력하세요" style="display:none; height: 80px;"></textarea>

        <button type="submit">제출</button>
    </form>

    <div id="result">
        <table id="moveList">
            <thead>
                <tr>
                    <th>관</th><th>좌석번호</th><th>복귀교시</th><th>이동사유</th><th>입력날짜</th><th>입력시간</th><th>점수</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="popupOverlay" class="popup-overlay"></div>

    <div id="counselingPopup" class="popup">
        <div class="popup-content">
            <h2 id="counselingPopupTitle">📅 상담 일정 선택</h2>
            <div class="confirm-info-box">
                <p>👨‍🏫 <b>담당 담임:</b> <span id="modalTeacherName"></span></p>
                <label for="consultDate"><b>1. 상담 날짜 선택:</b></label>
                <input type="text" id="consultDate" placeholder="날짜를 선택하세요" readonly>
                
                <label for="consultTime"><b>2. 상담 시간 선택:</b></label>
                <select id="consultTime">
                    <option value="">날짜를 먼저 선택하세요</option>
                </select>
            </div>
            <div class="popup-buttons">
                <button id="consultModalSubmitBtn">선택 완료</button>
                <button onclick="closeAllPopups()" class="cancel-btn">취소</button>
            </div>
        </div>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <h2 id="popupTitle">🌙 심야자습 좌석 선택</h2>
            <p style="font-size: 14px; color: #555; margin-bottom: 15px;">
                본인 좌석: <span id="popupOriginalSeat" style="font-weight:bold; color:#336699;"></span> &nbsp;|&nbsp;
                희망교시: <span id="popupReturnTime" style="font-weight:bold;"></span>
            </p>
            <div style="background-color: #f1f5f9; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 15px;">
                <label for="modalBuilding" style="display:inline-block; width: auto; margin:0 10px 0 0;">📌 이동할 관 선택:</label>
                <select id="modalBuilding" required style="width: 200px; padding: 8px; margin: 0; display: inline-block;">
                    <option value="">선택하세요</option>
                    <option value="7-1관">7-1관</option>
                </select>
                <span id="selectedTargetText" style="margin-left: 15px; font-weight:bold; color:#d9534f;">관을 선택해주세요.</span>
            </div>
            <div id="seatMapContainer" class="seat-map-container"><div id="seatGrid" class="seat-grid"></div></div>
            <div class="popup-buttons">
                <button id="popupSubmitButton">최종 제출</button>
                <button onclick="closeAllPopups()" class="cancel-btn">취소</button>
            </div>
        </div>
    </div>

    <div id="finalConfirmPopup" class="popup">
        <div class="popup-content">
            <h2 id="confirmReasonTitle">📝 최종 확인</h2>
            <div class="confirm-info-box">
                <p>📍 <b>본인 좌석:</b> <span id="c_origSeat"></span></p>
                <p id="c_targetArea">🚀 <b>이동 대상:</b> <span id="c_targetSeat"></span></p>
                <p>⏰ <b>이용 시간:</b> <span id="c_returnTime"></span></p>
            </div>
            <p style="color:#d9534f; font-weight:bold;">위 내용이 정확합니까?</p>
            <div class="popup-buttons">
                <button id="finalYesButton" style="background-color: #274e13;">네, 신청합니다</button>
                <button class="cancel-btn" onclick="closeAllPopups()">아니오</button>
            </div>
        </div>
    </div>

    <script>
    let moveList = [];
    let selectedTargetSeat = ""; 
    let studentGenderMap = {};
    let studentNameMap = {};    
    let studentTeacherMap = {}; 
    let userReservations = {}; 
    let validConsultDates = []; // 🚨 서버에서 받은 근무일 목록
    let studentBookings = {};  // 🚨 본인의 예약 내역 (취소용)
    let fp = null; // 달력 인스턴스

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYJ_wZv0U63C7_S44sNdzHJcSc5ftD1uNZOC-nNhL7Mm--NdV0ZZ6PRKjoW3m07vAs/exec";

    window.onload = function() {
        const fetchUrl = SCRIPT_URL + "?action=getGenderMap&t=" + new Date().getTime();
        fetch(fetchUrl).then(response => response.json()).then(data => {
            studentGenderMap = data.genderMap || {}; 
            studentNameMap = data.nameMap || {};        
            studentTeacherMap = data.teacherMap || {}; 
            userReservations = data.userReservations || {}; 
            validConsultDates = data.validDates || []; // 🚨 근무일 목록 수신
            initDatePicker(); // 초기 달력 설정 (근무일 기준)
            setReturnTimeOptionsForNightStudy(false);
        }).catch(err => console.error("통신 오류"));
    };

    // 🚨 달력 설정 함수 (상태에 따라 허용 날짜를 바꿈)
    function initDatePicker(allowDates = validConsultDates) {
        if (fp) fp.destroy(); // 기존 달력 제거
        fp = flatpickr("#consultDate", {
            locale: "ko",
            dateFormat: "Y-m-d",
            enable: allowDates, // 🚨 전달된 목록의 날짜만 클릭 가능!
            onChange: function(selectedDates, dateStr) {
                if (dateStr) updateTimeOptions(dateStr);
            }
        });
    }

    // 🚨 날짜 선택 시 시간 목록 업데이트 (신청/취소 분리)
    async function updateTimeOptions(dateStr) {
        const reason = document.getElementById("reason").value;
        const timeSelect = document.getElementById("consultTime");
        const teacher = document.getElementById("infoTeacherName").textContent;

        if (reason === "상담 취소") {
            // 🚨 취소일 때는 본인이 예약한 시간만 보여줌
            timeSelect.innerHTML = '<option value="">시간 선택</option>';
            studentBookings[dateStr].forEach(t => {
                const opt = document.createElement("option"); opt.value = t; opt.textContent = t;
                timeSelect.appendChild(opt);
            });
        } else {
            // 🚨 신청일 때는 선생님의 빈 시간만 서버에서 가져옴
            timeSelect.innerHTML = '<option>시간 조회 중...</option>';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getAvailableTimes&date=${dateStr}&teacher=${encodeURIComponent(teacher)}`);
                const data = await res.json();
                timeSelect.innerHTML = '<option value="">선택하세요</option>';
                data.times.forEach(t => {
                    const opt = document.createElement("option"); opt.value = t; opt.textContent = t;
                    timeSelect.appendChild(opt);
                });
            } catch (e) { timeSelect.innerHTML = '<option value="">오류 발생</option>'; }
        }
    }

    // 🚨 취소 시 본인 예약 내역 불러오기
    async function loadStudentBookings() {
        const b = document.getElementById("building").value.replace("관", "").trim();
        const s1 = document.getElementById("seatNumber").value;
        const s2 = document.getElementById("seatNumber2").value;
        const studentInfo = `${b}${s1}${s2} ${studentNameMap[b+s1+s2]}`;

        const res = await fetch(`${SCRIPT_URL}?action=getStudentBookings&studentInfo=${encodeURIComponent(studentInfo)}`);
        const data = await res.json();
        studentBookings = data.bookings; // { "2026-03-10": ["14:00~14:20"], ... }
        
        // 🚨 예약된 날짜들만 달력에서 클릭 가능하게 설정
        initDatePicker(Object.keys(studentBookings)); 
        fp.open();
    }

    function updateCounselingDisplay() {
        const b = document.getElementById("building").value.replace("관", "").trim();
        const s1 = document.getElementById("seatNumber").value;
        const s2 = document.getElementById("seatNumber2").value;
        const reason = document.getElementById("reason").value;
        const key = b + s1 + s2;
        const infoDiv = document.getElementById("counselingInfo");

        if (reason.includes("상담") && s1 && s2 && b) {
            const studentName = studentNameMap[key];
            const teacherName = studentTeacherMap[key];
            if (studentName) {
                document.getElementById("infoStudentName").textContent = studentName;
                document.getElementById("infoTeacherName").textContent = teacherName || "미배정 담임";
            } else {
                document.getElementById("infoStudentName").textContent = "미등록 (" + key + ")";
                document.getElementById("infoTeacherName").textContent = "-";
            }
            infoDiv.style.display = "block";
        } else {
            infoDiv.style.display = "none";
        }
    }

    const seatData = {
        "7-1관": [

    function closeAllPopups() { document.querySelectorAll(".popup, .popup-overlay").forEach(el => el.style.display = "none"); }

    const returnTimeSelect = document.getElementById("returnTime");
    function setReturnTimeOptionsForNightStudy(isNightStudy) {
        if (isNightStudy) returnTimeSelect.innerHTML = `<option value="">선택하세요</option><option value="9">9교시</option><option value="10">10교시</option>`;
        else returnTimeSelect.innerHTML = `<option value="">선택하세요</option><option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option><option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option><option value="7">7교시</option><option value="8">8교시</option><option value="복귀안함">복귀안함</option>`;
    }

    const fixedScores = { "지각":2,"입/퇴실 미준수":3,"핸드폰 미제출":10,"전자기기 무단사용":10,"핸드폰 무단사용":7,"무단이탈":10,"타층/타관 무단출입":5,"핸드폰/Wifi 무단반입":10,"무단결석":7,"원내대화":5,"무단지각":5,"취침강제하원":3,"음식물섭취":3 };

    document.getElementById("reason").addEventListener("change", function() {
        const val = this.value; 
        setReturnTimeOptionsForNightStudy(val.includes("심야자습"));
        updateCounselingDisplay();
        document.getElementById("scoreDiv").style.display = fixedScores[val] ? "block" : "none";
        document.getElementById("otherReason").style.display = (val === "기타") ? "block" : "none";
    });

    document.getElementById("modalBuilding").addEventListener("change", function() {
        const bld = this.value; const grid = document.getElementById("seatGrid"); selectedTargetSeat = "";
        if (!bld || !seatData[bld]) { document.getElementById("seatMapContainer").style.display = "none"; return; }
        const key = document.getElementById("building").value.replace("관", "").trim() + document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        grid.style.gridTemplateColumns = `42px 42px 14px 42px 42px 14px 42px 42px`; grid.innerHTML = "";
        seatData[bld].forEach((row, r) => {
            row.forEach((cell, c) => {
                const div = document.createElement("div"); div.className = "seat-cell"; const txt = cell.trim();
                div.style.gridRow = r+1; div.style.gridColumn = c+1;
                if ((c===2 || c===5) && (r<=15 || r>=20)) { div.className += " aisle"; grid.appendChild(div); return; }
                if (!txt) div.className += " empty";
                else {
                    div.className += " seat"; div.textContent = txt;
                    if (Object.values(userReservations).includes(txt)) div.className += " reserved";
                    else div.onclick = function() { const p = grid.querySelector(".selected"); if(p) p.classList.remove("selected"); this.classList.add("selected"); selectedTargetSeat = txt; document.getElementById("selectedTargetText").innerHTML = `✅ 선택: ${txt}`; };
                }
                grid.appendChild(div);
            });
        });
        document.getElementById("seatMapContainer").style.display = "block";
    });

    document.getElementById("moveForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const reas = document.getElementById("reason").value;
        const teacher = document.getElementById("infoTeacherName").textContent;

        if (reas === "상담 취소") {
            if (teacher === "-") return alert("먼저 좌석을 확인하세요.");
            document.getElementById("modalTeacherName").textContent = teacher;
            document.getElementById("counselingPopup").style.display = "block";
            document.getElementById("popupOverlay").style.display = "block";
            loadStudentBookings(); // 🚨 본인 예약 데이터 조회
        } else if (reas === "상담 신청") {
            if (teacher === "-") return alert("먼저 좌석을 확인하세요.");
            document.getElementById("modalTeacherName").textContent = teacher;
            initDatePicker(validConsultDates); // 🚨 근무일만 달력 활성화
            document.getElementById("counselingPopup").style.display = "block";
            document.getElementById("popupOverlay").style.display = "block";
        } else if (reas.includes("심야자습")) {
            document.getElementById("popupTitle").textContent = reas;
            document.getElementById("popupOriginalSeat").textContent = document.getElementById("building").value + " " + document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
            document.getElementById("popupReturnTime").textContent = document.getElementById("returnTime").value + "교시";
            document.getElementById("popup").style.display = "block";
            document.getElementById("popupOverlay").style.display = "block";
        } else {
            submitMoveData();
        }
    });

    document.getElementById("consultModalSubmitBtn").onclick = function() {
        const date = document.getElementById("consultDate").value;
        const time = document.getElementById("consultTime").value;
        if (!date || !time) return alert("날짜와 시간을 선택하세요.");
        
        selectedTargetSeat = document.getElementById("modalTeacherName").textContent;
        document.getElementById("c_origSeat").textContent = document.getElementById("building").value + " " + document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        document.getElementById("c_targetSeat").textContent = `${selectedTargetSeat} (${date})`;
        document.getElementById("c_returnTime").textContent = time;
        document.getElementById("confirmReasonTitle").textContent = `[${document.getElementById("reason").value}] 최종 확인`;
        
        document.getElementById("counselingPopup").style.display = "none";
        document.getElementById("finalConfirmPopup").style.display = "block";
    };

    document.getElementById("finalYesButton").onclick = function() {
        submitMoveData();
        closeAllPopups();
    };

    function submitMoveData() {
        const bld = document.getElementById("building").value;
        const sNum = document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        const reas = document.getElementById("reason").value;
        const rawScore = parseInt(document.getElementById("score").value);
        const score = fixedScores[reas] ? rawScore : null; // 🚨 상담 시 점수 오류 해결 (null 전송)

        const data = { 
            building: bld, seatNumber: sNum, returnTime: document.getElementById("c_returnTime").textContent || document.getElementById("returnTime").value, 
            reason: reas.includes("상담") ? `${reas} (${selectedTargetSeat})` : (reas === "기타" ? document.getElementById("otherReason").value : reas), 
            score: score, inputDate: document.getElementById("consultDate").value || new Date().toISOString().split('T')[0], 
            inputTime: new Date().toLocaleTimeString('ko-KR', {hour12:false}), targetSeat: selectedTargetSeat, 
            studentName: studentNameMap[bld.replace("관","").trim()+sNum], teacherName: selectedTargetSeat 
        };
        
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        alert("신청 완료!"); location.reload();
    }
