<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>러셀 테스트 이동일지 작성</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; text-align: center; margin: 20px; background-color: #f4f7f6; }
        h1 { color: #336699; font-size: 24px; }
        form { display: inline-block; text-align: left; border: 1px solid #e0e0e0; padding: 25px; width: 100%; max-width: 500px; box-sizing: border-box; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; background-color: #fafafa; }
        select:focus, textarea:focus { outline: none; border-color: #336699; background-color: #fff; }
        button { padding: 12px 20px; background-color: #336699; color: #fff; font-weight: bold; font-size: 16px; border: none; cursor: pointer; width: 100%; border-radius: 6px; transition: background-color 0.2s; }
        button:hover { background-color: #28597b; }
        #resetButton { margin: 10px 0 20px 0; float: left; width: auto; padding: 8px 16px; background-color: #999; cursor: pointer; border-radius: 6px; font-size: 14px; }
        #resetButton:hover { background-color: #777; }
        table { margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 800px; border-radius: 8px; overflow: hidden; background-color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        thead { background-color: #336699; color: white; font-weight: bold; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #f1f5f9; }
        .score { display: none; }

        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 850px; background-color: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); z-index: 1000; padding: 25px; box-sizing: border-box; }
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 999; }
        .popup-content { text-align: center; }
        .popup h2 { margin-top: 0; margin-bottom: 10px; color: #336699; }
        .popup-buttons { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .popup button { width: auto; min-width: 100px; }
        .cancel-btn { background-color: #aaa !important; }
        .cancel-btn:hover { background-color: #888 !important; }

        .time-btn { padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; color: #333; font-weight: bold; transition: 0.2s; min-width: 80px; }
        .time-btn:hover { border-color: #336699; background: #e3effa; transform: translateY(-2px); }
        .time-btn.selected { background: #336699; color: white; border-color: #1a3a5c; }

        #finalConfirmPopup { max-width: 400px; z-index: 1100; border-top: 5px solid #336699; }
        .confirm-info-box { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #eee; }
        .confirm-info-box p { margin: 8px 0; font-size: 15px; }

        .seat-map-container { width: 100%; max-height: 480px; overflow: auto; margin-top: 15px; border: 1px solid #e0e0e0; padding: 20px; background: #f8f9fa; border-radius: 8px; display: none; box-sizing: border-box; }
        .seat-grid { display: grid; gap: 2px 4px; justify-content: center; width: max-content; margin: 0 auto; }
        .seat-cell { height: 24px; font-size: 11px; text-align: center; display: flex; align-items: center; justify-content: center; user-select: none; box-sizing: border-box; border-radius: 3px; transition: transform 0.1s, box-shadow 0.1s; }
        .seat-cell.seat { background-color: #ffffff; border: 1px solid #b3bccc; cursor: pointer; color: #333; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .seat-cell.seat:hover { background-color: #e3effa; border-color: #336699; transform: translateY(-1px); }
        .seat-cell.seat.selected { background-color: #336699; color: white; border-color: #1a3a5c; box-shadow: 0 0 8px rgba(51, 102, 153, 0.6); }
        .seat-cell.seat.reserved { background-color: #ffeded; color: #d9534f; border-color: #ffcccc; cursor: not-allowed; pointer-events: none; text-decoration: line-through; }
        .seat-cell.seat.disabled { background-color: #f2f2f2; color: #c0c0c0; border-color: #e0e0e0; cursor: not-allowed; box-shadow: none; pointer-events: none; }
        .seat-cell.aisle { background-color: #7a7a7a; border-radius: 0; border: none; width: 100%; height: 100%; transform: scaleY(1.2); z-index: 1; pointer-events: none; }
        .seat-cell.empty { background-color: transparent; border: none; padding: 0; pointer-events: none; }
    </style>
</head>
<body>
    <h1>러셀 이동일지&교육점수 작성</h1>
    <button id="resetButton" onclick="resetTable()">테이블 초기화</button>

    <form id="moveForm">
        <label for="building">관 (본인):</label>
        <select id="building" required>
            <option value="">선택하세요</option>
            <option value="4-1관">4-1관</option><option value="4-2관">4-2관</option>
            <option value="4-3관">4-3관</option><option value="4-4관">4-4관</option>
            <option value="4-5관">4-5관</option>
        </select>

        <label for="seatNumber">좌석번호 (본인):</label>
        <div style="display: flex; gap: 10px;">
            <select id="seatNumber" required style="margin-bottom: 0;">
                <option value="">알파벳</option>
                <optgroup label="A~I">
                    <option value="A">A</option><option value="B">B</option>
                    <option value="C">C</option><option value="D">D</option>
                    <option value="F">F</option><option value="G">G</option>
                    <option value="H">H</option><option value="I">I</option>
                    <option value="J">J</option><option value="K">K</option>
                </optgroup>
            </select>
            <select id="seatNumber2" required style="margin-bottom: 0;">
                <option value="">번호</option>
                <optgroup label="1~40">
                    <option value="01">01</option><option value="02">02</option><option value="03">03</option>
                    <option value="04">04</option><option value="05">05</option><option value="06">06</option>
                    <option value="07">07</option><option value="08">08</option><option value="09">09</option>
                    <option value="10">10</option><option value="11">11</option>
                </optgroup>
            </select>
        </div>
        <div style="margin-bottom: 15px;"></div>

        <label for="reason">이동사유:</label>
        <select id="reason" required>
            <option value="">선택하세요</option>
            <optgroup label="담임 상담">
                <option value="상담 신청">상담 신청</option>
                <option value="상담 취소">상담 취소</option>
            </optgroup>
            <optgroup label="일반 이동">
                <option value="화장실/정수기">화장실/정수기</option><option value="튜터 질의응답">튜터 질의응답</option>
                <option value="외부 학원/과외/보충">외부 학원/과외/보충</option><option value="자료수령">자료수령</option>
                <option value="가족 행사">가족 행사</option><option value="병원">병원</option>
                <option value="식사">식사</option><option value="기타">기타</option>
                <option value="조퇴(컨디션난조)">조퇴(컨디션난조)</option>
            </optgroup>
            <optgroup label="심야자습">
                <option value="심야자습 신청">심야자습 신청</option><option value="심야자습 취소">심야자습 취소</option>
            </optgroup>
            <optgroup label="규정 위반/지도">
                <option value="지각">지각</option><option value="입/퇴실 미준수">입/퇴실 미준수</option>
                <option value="핸드폰 미제출">핸드폰 미제출</option><option value="전자기기 무단사용">전자기기 무단사용</option>
                <option value="핸드폰 무단사용">핸드폰 무단사용</option><option value="무단이탈">무단이탈</option>
                <option value="타층/타관 무단출입">타층/타관 무단출입</option><option value="핸드폰/Wifi 무단반입">핸드폰/Wifi 무단반입</option>
                <option value="무단결석">무단결석</option><option value="원내대화">원내대화</option>
                <option value="무단지각">무단지각</option><option value="취침강제하원">취침강제하원</option>
                <option value="음식물섭취">음식물섭취</option>
            </optgroup>
        </select>

        <label for="returnTime">복귀교시:</label>
        <select id="returnTime" required>
            <option value="">사유를 먼저 선택하세요</option>
        </select>

        <div id="scoreDiv" class="score">
            <label for="score">점수 (1~10점):</label>
            <select id="score">
                <option value="1">1점</option><option value="2">2점</option><option value="3">3점</option>
                <option value="4">4점</option><option value="5">5점</option><option value="6">6점</option>
                <option value="7">7점</option><option value="8">8점</option><option value="9">9점</option>
                <option value="10">10점</option>
            </select>
        </div>
        <label for="otherReason" id="otherReasonLabel" style="display:none;">기타 사유:</label>
        <textarea id="otherReason" placeholder="내용을 입력하세요" style="display:none; height: 80px;"></textarea>

        <button type="submit">제출</button>
    </form>

    <div id="result">
        <table id="moveList">
            <thead>
                <tr>
                    <th>관</th><th>좌석번호</th><th>복귀교시</th><th>이동사유</th><th>입력날짜</th><th>입력시간</th><th>점수</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="popupOverlay" class="popup-overlay"></div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <h2 id="popupTitle">🌙 심야자습 좌석 선택</h2>
            <p style="font-size: 14px; color: #555; margin-bottom: 15px;">본인 좌석: <span id="popupOriginalSeat" style="font-weight:bold; color:#336699;"></span> &nbsp;|&nbsp; 희망교시: <span id="popupReturnTime" style="font-weight:bold;"></span></p>
            <div style="background-color: #f1f5f9; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 15px;">
                <label for="modalBuilding" style="display:inline-block; width: auto; margin:0 10px 0 0;">📌 이동할 관 선택:</label>
                <select id="modalBuilding" style="width: 200px; padding: 8px; margin: 0; display: inline-block;">
                    <option value="">선택하세요</option><option value="7-1관">7-1관</option>
                </select>
                <span id="selectedTargetText" style="margin-left: 15px; font-weight:bold; color:#d9534f;">관을 선택해주세요.</span>
            </div>
            <div id="seatMapContainer" class="seat-map-container"><div id="seatGrid" class="seat-grid"></div></div>
            <div class="popup-buttons"><button id="popupSubmitButton">최종 제출</button><button id="popupCancelButton" class="cancel-btn">취소</button></div>
        </div>
    </div>

    <div id="counselingPopup" class="popup" style="max-width: 500px;">
        <div class="popup-content">
            <h2 id="counselingPopupTitle">👨‍🏫 담임 선생님 상담</h2>
            <p style="margin-bottom: 15px; font-size: 15px;">담임 선생님: <span id="counselingTeacherName" style="font-weight:bold; color:#336699;"></span></p>
            
            <div style="background-color: #f1f5f9; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 15px;">
                <label for="counselingDateSelect" style="display:inline-block; font-weight:bold; margin-right:10px;">📅 날짜 선택:</label>
                <input type="text" id="counselingDateSelect" placeholder="달력에서 날짜를 선택하세요" style="width: 200px; padding: 8px; display: inline-block; border-radius:4px; border:1px solid #ccc; background-color:#fff; cursor:pointer;" readonly>
            </div>

            <div id="counselingTimeContainer" style="display:none; text-align:left; padding: 10px 0;">
                <p style="font-weight:bold; margin-bottom:10px;">⏰ 시간 선택 <span id="counselingHelpText" style="font-size:12px; color:#666; font-weight:normal;"></span></p>
                <div id="counselingTimeGrid" style="display:flex; flex-wrap:wrap; gap:8px;">
                    </div>
            </div>

            <p id="selectedTimeText" style="margin-top: 15px; font-weight:bold; color:#d9534f;">달력에서 날짜를 먼저 선택해주세요.</p>
            <div class="popup-buttons">
                <button id="counselingSubmitButton">최종 제출</button>
                <button id="counselingCancelButton" class="cancel-btn">취소</button>
            </div>
        </div>
    </div>

    <div id="finalConfirmPopup" class="popup">
        <div class="popup-content">
            <h2 id="confirmReasonTitle">📝 최종 확인</h2>
            <div class="confirm-info-box">
                <p>📍 <b>본인 좌석:</b> <span id="c_origSeat"></span></p>
                <p>🚀 <b>이동/대상:</b> <span id="c_targetSeat"></span></p>
                <p>⏰ <b>이용 교시/시간:</b> <span id="c_returnTime"></span></p>
            </div>
            <p style="color:#d9534f; font-weight:bold;">위 내용이 정확합니까?</p>
            <div class="popup-buttons"><button id="finalYesButton" style="background-color: #274e13;">네, 신청합니다</button><button id="finalNoButton" class="cancel-btn">아니오</button></div>
        </div>
    </div>

    <script>
    let moveList = [];
    let selectedTargetSeat = ""; 
    let selectedCounselingDate = ""; 
    let selectedCounselingTime = ""; 
    let isCounselingCancel = false;  
    let globalScheduleData = null;   
    let fpInstance = null; 
    let currentColToDateMap = {}; 
    
    let studentGenderMap = {}, studentNameMap = {}, studentTeacherMap = {}, userReservations = {}; 

    // 🚨 본인의 앱스 스크립트 웹앱 주소로 수정하세요!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYJ_wZv0U63C7_S44sNdzHJcSc5ftD1uNZOC-nNhL7Mm--NdV0ZZ6PRKjoW3m07vAs/exec";

    window.onload = function() {
        fetch(SCRIPT_URL + "?action=getGenderMap&t=" + new Date().getTime()).then(res => res.json()).then(data => {
            studentGenderMap = data.genderMap || {}; studentNameMap = data.nameMap || {};
            studentTeacherMap = data.teacherMap || {}; userReservations = data.userReservations || {}; 
            setReturnTimeOptionsForNightStudy(false);
        }).catch(err => console.error("통신 오류"));
    };

    const seatData = {
        "7-1관": [
            ["7-1A01", "7-1B01", "", "7-1C01", "7-1D01", "", "7-1F01", "7-1G01"], ["7-1A02", "7-1B02", "", "7-1C02", "7-1D02", "", "7-1F02", "7-1G02"], ["7-1A03", "7-1B03", "", "7-1C03", "7-1D03", "", "7-1F03", "7-1G03"], ["7-1A04", "7-1B04", "", "7-1C04", "7-1D04", "", "7-1F04", "7-1G04"], ["7-1A05", "7-1B05", "", "7-1C05", "7-1D05", "", "7-1F05", "7-1G05"], ["7-1A06", "7-1B06", "", "7-1C06", "7-1D06", "", "7-1F06", "7-1G06"], ["7-1A07", "7-1B07", "", "7-1C07", "7-1D07", "", "7-1F07", "7-1G07"], ["7-1A08", "7-1B08", "", "7-1C08", "7-1D08", "", "7-1F08", ""], ["7-1A09", "7-1B09", "", "7-1C09", "7-1D09", "", "7-1F09", ""], ["7-1A10", "7-1B10", "", "7-1C10", "7-1D10", "", "7-1F10", ""], ["7-1A11", "7-1B11", "", "7-1C11", "7-1D11", "", "7-1F11", ""], ["7-1A12", "7-1B12", "", "7-1C12", "7-1D12", "", "7-1F12", ""], ["7-1A13", "7-1B13", "", "7-1C13", "7-1D13", "", "7-1F13", ""], ["", "7-1B14", "", "7-1C14", "7-1D14", "", "7-1F14", ""], ["", "7-1B15", "", "7-1C15", "7-1D15", "", "7-1F15", ""], ["", "", "", "7-1C16", "7-1D16", "", "7-1F16", ""], ["", "", "", "", "", "", "", ""], ["1 페이지", "", "", "", "", "", "", ""], ["", "", "", "", "", "", "", "출입문"], ["", "", "", "", "", "", "", ""], ["", "", "", "7-1C34", "7-1D34", "", "7-1F34", "7-1G34"], ["", "", "", "7-1C33", "7-1D33", "", "7-1F33", "7-1G33"], ["", "7-1B32", "", "7-1C32", "7-1D32", "", "7-1F32", "7-1G32"], ["", "7-1B31", "", "7-1C31", "7-1D31", "", "7-1F31", "7-1G31"], ["", "7-1B30", "", "7-1C30", "7-1D30", "", "7-1F30", "7-1G30"], ["7-1A29", "7-1B29", "", "7-1C29", "7-1D29", "", "7-1F29", "7-1G29"], ["7-1A28", "7-1B28", "", "7-1C28", "7-1D28", "", "7-1F28", "7-1G28"], ["7-1A27", "7-1B27", "", "7-1C27", "7-1D27", "", "7-1F27", "7-1G27"], ["7-1A26", "7-1B26", "", "7-1C26", "7-1D26", "", "7-1F26", "7-1G26"], ["7-1A25", "7-1B25", "", "7-1C25", "7-1D25", "", "7-1F25", "7-1G25"], ["7-1A24", "7-1B24", "", "7-1C24", "7-1D24", "", "7-1F24", "7-1G24"], ["7-1A23", "7-1B23", "", "7-1C23", "7-1D23", "", "7-1F23", "7-1G23"], ["7-1A22", "7-1B22", "", "7-1C22", "7-1D22", "", "7-1F22", "7-1G22"], ["7-1A21", "7-1B21", "", "7-1C21", "7-1D21", "", "7-1F21", "7-1G21"]
        ]
    };

    const returnTimeSelect = document.getElementById("returnTime");
    function setReturnTimeOptionsForNightStudy(isNightStudy) {
        if (isNightStudy) returnTimeSelect.innerHTML = `<option value="">선택하세요</option><option value="9">9교시</option><option value="10">10교시</option>`;
        else returnTimeSelect.innerHTML = `<option value="">선택하세요</option><option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option><option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option><option value="7">7교시</option><option value="8">8교시</option><option value="복귀안함">복귀안함</option>`;
    }

    const fixedScores = { "지각":1,"입/퇴실 미준수":3,"핸드폰 미제출":10,"전자기기 무단사용":10,"핸드폰 무단사용":7,"무단이탈":10,"타층/타관 무단출입":5,"핸드폰/Wifi 무단반입":10,"무단결석":7,"원내대화":5,"무단지각":5,"취침강제하원":3,"음식물섭취":3 };

    document.getElementById("reason").addEventListener("change", function() {
        const val = this.value; 
        const isNS = (val === "심야자습 신청" || val === "심야자습 취소");
        
        setReturnTimeOptionsForNightStudy(isNS);
        document.getElementById("scoreDiv").style.display = fixedScores[val] ? "block" : "none";
        
        if (val.includes("상담")) {
            returnTimeSelect.innerHTML = `<option value="상담시간선택">시간 선택 팝업에서 진행</option>`;
        }
        
        if (val === "기타") { document.getElementById("otherReason").style.display = "block"; document.getElementById("otherReasonLabel").style.display = "block"; } 
        else { document.getElementById("otherReason").style.display = "none"; document.getElementById("otherReasonLabel").style.display = "none"; }
        if (fixedScores[val]) document.getElementById("score").value = fixedScores[val];
    });

    document.getElementById("moveForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const b = document.getElementById("building").value; 
        const s1 = document.getElementById("seatNumber").value; 
        const s2 = document.getElementById("seatNumber2").value;
        const ret = document.getElementById("returnTime").value; 
        const reas = document.getElementById("reason").value;
        const key = b.replace("관", "").trim() + s1 + s2;

        if (reas.includes("심야자습")) {
            if (!studentGenderMap[key]) { alert("등록되지 않은 좌석입니다."); return; }
            if (reas === "심야자습 신청" && userReservations[key]) { alert(`이미 자리를 신청하셨습니다. (${userReservations[key]})`); return; }
            if (reas === "심야자습 취소" && !userReservations[key]) { alert("신청 내역이 없습니다."); return; }
            if (!ret) { alert("복귀 교시를 선택해주세요."); return; }

            document.getElementById("popupTitle").textContent = reas;
            document.getElementById("popupOriginalSeat").textContent = `${b} ${s1}${s2}`;
            document.getElementById("popupReturnTime").textContent = ret + "교시";
            document.getElementById("modalBuilding").value = ""; 
            document.getElementById("seatMapContainer").style.display = "none";
            document.getElementById("popupOverlay").style.display = "block"; 
            document.getElementById("popup").style.display = "block";
        } 
        else if (reas.includes("상담")) {
            const teacherName = studentTeacherMap[key];
            if (!teacherName) { alert("학생의 담임 선생님 정보를 찾을 수 없습니다."); return; }
            openCounselingPopup(teacherName, reas === "상담 취소");
        }
        else {
            const isScoreReason = fixedScores[reas] ? true : false;
            submitMoveData(b, s1+s2, ret, reas, document.getElementById("otherReason").value, isScoreReason ? parseInt(document.getElementById("score").value) : null, "", "");
        }
    });

    function openCounselingPopup(teacherName, isCancel) {
        isCounselingCancel = isCancel;
        document.getElementById("counselingPopupTitle").textContent = isCancel ? "👨‍🏫 담임 선생님 상담 취소" : "👨‍🏫 담임 선생님 상담 신청";
        document.getElementById("counselingHelpText").textContent = isCancel ? "(본인이 신청한 시간만 나타납니다)" : "(신청 가능한 시간만 나타납니다)";
        document.getElementById("counselingTeacherName").textContent = teacherName;
        
        const dateInput = document.getElementById("counselingDateSelect");
        dateInput.value = "";
        dateInput.placeholder = "달력 데이터 불러오는 중...";
        dateInput.disabled = true;

        document.getElementById("counselingTimeContainer").style.display = "none";
        document.getElementById("popupOverlay").style.display = "block";
        document.getElementById("counselingPopup").style.display = "block";
        selectedCounselingDate = ""; selectedCounselingTime = "";
        document.getElementById("selectedTimeText").textContent = "달력에서 날짜를 먼저 선택해주세요.";

        fetch(`${SCRIPT_URL}?action=getTeacherSchedule&teacherName=${encodeURIComponent(teacherName)}`)
            .then(res => res.json())
            .then(data => {
                if (data.error) throw new Error(data.error);
                globalScheduleData = data;
                initFlatpickr(data); 
            }).catch(err => {
                alert("시간표 로드 실패: " + err.message);
                document.getElementById("counselingPopup").style.display = "none";
                document.getElementById("popupOverlay").style.display = "none";
            });
    }

    function initFlatpickr(data) {
        const key = document.getElementById("building").value.replace("관", "").trim() + document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        const studentName = studentNameMap[key] || "미확인";
        const targetString = `상담(${studentName})`;

        let availableDates = [];
        currentColToDateMap = {};

        const dates = data[1].slice(1);
        dates.forEach((d, index) => {
            const colIdx = index + 1;
            let dateStr = String(d).split("T")[0]; 
            currentColToDateMap[dateStr] = colIdx;

            let hasSlots = false;
            for (let r = 2; r < data.length; r++) {
                const cellValue = String(data[r][colIdx]).trim();
                if (isCounselingCancel) {
                    if (cellValue.includes(targetString)) hasSlots = true; 
                } else {
                    if (cellValue === "") hasSlots = true; 
                }
            }
            if (hasSlots) availableDates.push(dateStr); 
        });

        const dateInput = document.getElementById("counselingDateSelect");
        
        if (fpInstance) fpInstance.destroy(); 
        
        if (availableDates.length === 0) {
            dateInput.placeholder = isCounselingCancel ? "취소할 상담 내역이 없습니다." : "신청 가능한 날짜가 없습니다.";
            dateInput.disabled = true;
            return;
        }

        dateInput.placeholder = "여기를 클릭하여 달력을 여세요";
        dateInput.disabled = false;

        fpInstance = flatpickr("#counselingDateSelect", {
            locale: "ko", 
            enable: availableDates, 
            dateFormat: "Y-m-d",
            disableMobile: "true", 
            onChange: function(selectedDates, dateStr) {
                renderTimeSlots(currentColToDateMap[dateStr], dateStr); 
            }
        });
    }

    function renderTimeSlots(colIdx, dateStr) {
        selectedCounselingDate = dateStr;
        selectedCounselingTime = "";
        document.getElementById("selectedTimeText").textContent = "시간을 선택해주세요.";
        
        const timeGrid = document.getElementById("counselingTimeGrid");
        timeGrid.innerHTML = "";
        
        if (!colIdx) { document.getElementById("counselingTimeContainer").style.display = "none"; return; }
        document.getElementById("counselingTimeContainer").style.display = "block";
        
        const key = document.getElementById("building").value.replace("관", "").trim() + document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        const studentName = studentNameMap[key] || "미확인";
        const targetString = `상담(${studentName})`;

        let hasSlots = false;
        for (let r = 2; r < globalScheduleData.length; r++) {
            const timeLabel = globalScheduleData[r][0];
            const cellValue = String(globalScheduleData[r][colIdx]).trim();
            
            let canShow = false;
            if (isCounselingCancel) { if (cellValue.includes(targetString)) canShow = true; }
            else { if (cellValue === "") canShow = true; }

            if (canShow) {
                hasSlots = true;
                const btn = document.createElement("button");
                btn.className = "time-btn";
                btn.type = "button";
                btn.textContent = timeLabel.split("~")[0].trim(); 
                
                btn.onclick = function() {
                    Array.from(timeGrid.children).forEach(child => child.classList.remove("selected"));
                    this.classList.add("selected");
                    selectedCounselingTime = timeLabel.split("~")[0].trim();
                    document.getElementById("selectedTimeText").innerHTML = `✅ 선택 일시: ${selectedCounselingDate} ${selectedCounselingTime}`;
                };
                timeGrid.appendChild(btn);
            }
        }
        if (!hasSlots) timeGrid.innerHTML = `<span style="color:#666; font-size:14px;">선택한 날짜에 가능한 시간이 없습니다.</span>`;
    }

    document.getElementById("counselingSubmitButton").onclick = function() {
        if (!selectedCounselingTime) { alert("상담 시간을 선택해주세요!"); return; }
        const b = document.getElementById("building").value;
        const s = document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        const teacher = document.getElementById("counselingTeacherName").textContent;
        
        document.getElementById("c_origSeat").textContent = `${b} ${s}`;
        document.getElementById("c_targetSeat").textContent = teacher + " 선생님";
        document.getElementById("c_returnTime").textContent = `${selectedCounselingDate} ${selectedCounselingTime}`;
        document.getElementById("confirmReasonTitle").textContent = `[${isCounselingCancel ? '상담 취소' : '상담 신청'}] 최종 확인`;
        
        document.getElementById("counselingPopup").style.display = "none";
        document.getElementById("finalConfirmPopup").style.display = "block";
        selectedTargetSeat = teacher; 
    };

    // 🚨 여기서 시간을 무조건 KST(한국 표준시)로 변환하도록 수정했습니다!
    function submitMoveData(bld, sNum, ret, reas, other, score, target, cDate) {
        // 클라이언트 시간과 무관하게 KST 시간 구하기
        const curr = new Date();
        const utc = curr.getTime() + (curr.getTimezoneOffset() * 60000);
        const kstNow = new Date(utc + (9 * 3600000)); // UTC + 9시간 (한국시간)

        const date = `${kstNow.getFullYear()}-${String(kstNow.getMonth()+1).padStart(2,'0')}-${String(kstNow.getDate()).padStart(2,'0')}`;
        const time = `${String(kstNow.getHours()).padStart(2,'0')}:${String(kstNow.getMinutes()).padStart(2,'0')}:${String(kstNow.getSeconds()).padStart(2,'0')}`;
        
        const cleanR = reas === "기타" ? other : reas;
        const key = bld.replace("관", "").trim() + sNum;
        const studentName = studentNameMap[key] || "미확인";

        const data = { 
            building: bld, seatNumber: sNum, returnTime: ret, reason: cleanR, score: score, 
            inputDate: date, inputTime: time, targetSeat: target, studentName: studentName, counselingDate: cDate
        };

        if (reas.includes("심야자습")) {
            if (reas === "심야자습 신청") userReservations[key] = target; else delete userReservations[key];
        }

        const displayReason = (reas.includes("심야자습") || reas.includes("상담")) ? `${cleanR} ➡️ ${target} ${cDate?'('+cDate.slice(-5)+')':''}` : cleanR;
        moveList.unshift({ ...data, displayReason: displayReason }); refreshMoveList();
        
        document.getElementById("moveForm").reset();
        document.getElementById("scoreDiv").style.display = "none";
        setReturnTimeOptionsForNightStudy(false);

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) }).catch(err => console.error("전송 에러"));
    }

    document.getElementById("finalYesButton").onclick = function() {
        const b = document.getElementById("building").value; 
        const s = document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        const reas = document.getElementById("reason").value;
        const time = reas.includes("상담") ? selectedCounselingTime : document.getElementById("returnTime").value;
        
        submitMoveData(b, s, time, reas, "", null, selectedTargetSeat, reas.includes("상담") ? selectedCounselingDate : "");
        document.getElementById("finalConfirmPopup").style.display = "none"; 
        document.getElementById("popupOverlay").style.display = "none";
    };

    document.getElementById("finalNoButton").onclick = function() { 
        document.getElementById("finalConfirmPopup").style.display = "none"; 
        const reas = document.getElementById("reason").value;
        if(reas.includes("상담")) document.getElementById("counselingPopup").style.display = "block";
        else document.getElementById("popup").style.display = "block"; 
    };

    // 기타 UI 함수 (심야자습 팝업)
    document.getElementById("modalBuilding").addEventListener("change", function() {
        const bld = this.value; const grid = document.getElementById("seatGrid"); selectedTargetSeat = "";
        if (!bld || !seatData[bld]) { document.getElementById("seatMapContainer").style.display = "none"; return; }
        const key = document.getElementById("building").value.replace("관", "").trim() + document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        const gender = studentGenderMap[key]; const reason = document.getElementById("reason").value; const myRes = userReservations[key];
        
        grid.style.gridTemplateColumns = `42px 42px 14px 42px 42px 14px 42px 42px`; grid.innerHTML = "";
        seatData[bld].forEach((row, r) => {
            row.forEach((cell, c) => {
                const div = document.createElement("div"); div.className = "seat-cell"; const txt = cell.trim();
                div.style.gridRow = r+1; div.style.gridColumn = c+1;
                if ((c===2 || c===5) && (r<=15 || r>=20)) { div.className += " aisle"; grid.appendChild(div); return; }
                if (!txt) div.className += " empty";
                else if (txt.includes("출입문")) { div.className += " door"; div.innerHTML = "🚪<br>문"; div.style.gridColumn = "7/9"; div.style.gridRow = `${r+1}/span 2`; }
                else {
                    div.className += " seat"; div.textContent = txt; let ok = true; let rs = false;
                    if (reason === "심야자습 취소") { if(txt !== myRes) ok = false; }
                    else {
                        const n = parseInt(txt.slice(-2)); if((gender==="남" && n>16) || (gender==="여" && (n<21 || n>36))) ok = false;
                        if (Object.values(userReservations).includes(txt)) { ok = false; rs = true; }
                    }
                    if (rs) div.className += " reserved"; else if (!ok) div.className += " disabled";
                    else div.onclick = function() { const p = grid.querySelector(".selected"); if(p) p.classList.remove("selected"); this.classList.add("selected"); selectedTargetSeat = txt; };
                }
                grid.appendChild(div);
            });
        });
        document.getElementById("seatMapContainer").style.display = "block";
    });
    document.getElementById("popupSubmitButton").onclick = function() {
        if (!selectedTargetSeat) { alert("좌석을 선택해주세요!"); return; }
        document.getElementById("c_origSeat").textContent = document.getElementById("building").value + " " + document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        document.getElementById("c_targetSeat").textContent = selectedTargetSeat;
        document.getElementById("c_returnTime").textContent = document.getElementById("returnTime").value + "교시";
        document.getElementById("confirmReasonTitle").textContent = `[${document.getElementById("reason").value}] 최종 확인`;
        document.getElementById("popup").style.display = "none"; document.getElementById("finalConfirmPopup").style.display = "block";
    };
    document.getElementById("popupCancelButton").onclick = () => { document.getElementById("popup").style.display = "none"; document.getElementById("popupOverlay").style.display = "none"; };
    document.getElementById("counselingCancelButton").onclick = () => { document.getElementById("counselingPopup").style.display = "none"; document.getElementById("popupOverlay").style.display = "none"; };

    function refreshMoveList() {
        const tbody = document.querySelector("#moveList tbody"); tbody.innerHTML = "";
        moveList.forEach(m => { const r = document.createElement("tr"); r.innerHTML = `<td>${m.building}</td><td>${m.seatNumber}</td><td>${m.returnTime}${m.reason.includes('상담')?'':'교시'}</td><td>${m.displayReason}</td><td>${m.inputDate}</td><td>${m.inputTime}</td><td>${m.score || '-'}</td>`; tbody.appendChild(r); });
    }
    function resetTable() { moveList = []; refreshMoveList(); }
    </script>
</body>
</html>
