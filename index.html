<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>러셀 테스트 이동일지 작성</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; text-align: center; margin: 20px; background-color: #f4f7f6; }
        h1 { color: #336699; font-size: 24px; }
        form {
            display: inline-block; text-align: left; border: 1px solid #e0e0e0;
            padding: 25px; width: 100%; max-width: 500px; box-sizing: border-box;
            background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        select, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box;
            font-size: 16px; border-radius: 6px; border: 1px solid #ccc; background-color: #fafafa;
        }
        select:focus, textarea:focus { outline: none; border-color: #336699; background-color: #fff; }
        button {
            padding: 12px 20px; background-color: #336699; color: #fff; font-weight: bold; font-size: 16px;
            border: none; cursor: pointer; width: 100%; border-radius: 6px; transition: background-color 0.2s;
        }
        button:hover { background-color: #28597b; }
        #resetButton {
            margin: 10px 0 20px 0; float: left; width: auto; padding: 8px 16px;
            background-color: #999; cursor: pointer; border-radius: 6px; font-size: 14px;
        }
        #resetButton:hover { background-color: #777; }
        table {
            margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 800px;
            border-radius: 8px; overflow: hidden; background-color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        thead { background-color: #336699; color: white; font-weight: bold; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #f1f5f9; }
        .error {
            color: red; margin-top: 10px; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background-color: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            font-size: 16px; display: none; z-index: 2000;
        }
        .score { display: none; }

        /* 팝업 스타일 */
        .popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 95%; max-width: 850px; 
            background-color: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 1000; padding: 25px; box-sizing: border-box;
        }
        .popup-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); z-index: 999;
        }
        .popup-content { text-align: center; }
        .popup h2 { margin-top: 0; margin-bottom: 10px; color: #336699; }
        .popup-buttons { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .popup button { width: auto; min-width: 100px; }
        .popup button#popupCancelButton { background-color: #aaa; }
        .popup button#popupCancelButton:hover { background-color: #888; }
        #alertPopup .popup-buttons button { margin: 0; }

        /* 좌석표 컨테이너 */
        .seat-map-container {
            width: 100%;
            max-height: 480px;
            overflow: auto; 
            margin-top: 15px;
            border: 1px solid #e0e0e0;
            padding: 20px;
            background: #f8f9fa; 
            border-radius: 8px;
            display: none; 
            box-sizing: border-box;
        }

        /* 8열 완벽 그리드 */
        .seat-grid {
            display: grid;
            gap: 2px 4px; 
            justify-content: center; 
            width: max-content; 
            margin: 0 auto;
        }
        
        .seat-cell {
            height: 24px;
            font-size: 11px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
            border-radius: 3px; 
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .seat-cell.seat {
            background-color: #ffffff;
            border: 1px solid #b3bccc;
            cursor: pointer;
            color: #333;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .seat-cell.seat:hover {
            background-color: #e3effa;
            border-color: #336699;
            transform: translateY(-1px);
        }
        .seat-cell.seat.selected {
            background-color: #336699; 
            color: white;
            border-color: #1a3a5c;
            box-shadow: 0 0 8px rgba(51, 102, 153, 0.6);
        }

        /* 선택 불가능한 좌석(성별 다름) 시각적 비활성화 스타일 */
        .seat-cell.seat.disabled {
            background-color: #f2f2f2;
            color: #c0c0c0;
            border-color: #e0e0e0;
            cursor: not-allowed;
            box-shadow: none;
            pointer-events: none; /* 마우스 호버 및 클릭 완전 차단 */
        }

        /* 중앙 굵은 회색 통로 */
        .seat-cell.aisle {
            background-color: #7a7a7a; 
            border-radius: 0;
            border: none;
            width: 100%; 
            height: 100%;
            transform: scaleY(1.2);
            z-index: 1;
            pointer-events: none;
        }

        .seat-cell.empty {
            background-color: transparent;
            border: none;
            padding: 0;
            pointer-events: none;
        }
        
        .seat-cell.title-text {
            color: #336699;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            justify-content: center;
        }
        
        .seat-cell.door {
            background-color: #e2f0d9;
            color: #274e13;
            border: 1px dashed #93c47d;
            border-radius: 4px;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
        }

        @media (max-width: 768px) {
            form { padding: 15px; }
            button { width: 100%; }
            table, th, td { font-size: 14px; }
            select, textarea { padding: 14px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <h1>러셀 이동일지&교육점수 작성</h1>
    <button id="resetButton" onclick="resetTable()">테이블 초기화</button>

    <form id="moveForm">
        <label for="building">관 (본인):</label>
        <select id="building" required>
            <option value="">선택하세요</option>
            <option value="4-1관">4-1관</option><option value="4-2관">4-2관</option>
            <option value="4-3관">4-3관</option><option value="4-4관">4-4관</option>
            <option value="4-5관">4-5관</option><option value="5-1관">5-1관</option>
            <option value="6-1관">6-1관</option><option value="7-1관">7-1관</option>
        </select>

        <label for="seatNumber">좌석번호 (본인):</label>
        <div style="display: flex; gap: 10px;">
            <select id="seatNumber" required style="margin-bottom: 0;">
                <option value="">알파벳</option>
                <optgroup label="A~I">
                    <option value="A">A</option><option value="B">B</option>
                    <option value="C">C</option><option value="D">D</option>
                    <option value="F">F</option><option value="G">G</option>
                    <option value="H">H</option><option value="I">I</option>
                </optgroup>
            </select>
            <select id="seatNumber2" required style="margin-bottom: 0;">
                <option value="">번호</option>
                <optgroup label="1~40">
                    <option value="01">01</option><option value="02">02</option><option value="03">03</option>
                    <option value="04">04</option><option value="05">05</option><option value="06">06</option>
                    <option value="07">07</option><option value="08">08</option><option value="09">09</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                    <option value="13">13</option><option value="14">14</option><option value="15">15</option>
                </optgroup>
            </select>
        </div>
        <div style="margin-bottom: 15px;"></div>

        <label for="returnTime">복귀교시:</label>
        <select id="returnTime" required>
            <option value="">선택하세요</option>
            <option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option>
            <option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option>
            <option value="7">7교시</option><option value="8">8교시</option><option value="9">9교시</option>
            <option value="10">10교시</option><option value="복귀안함">복귀안함</option>
        </select>

        <label for="reason">이동사유:</label>
        <select id="reason" required>
            <option value="">선택하세요</option>
            <optgroup label="일반 이동">
                <option value="화장실/정수기">화장실/정수기</option><option value="튜터 질의응답">튜터 질의응답</option>
                <option value="외부 학원/과외/보충">외부 학원/과외/보충</option><option value="자료수령">자료수령</option>
                <option value="가족 행사">가족 행사</option><option value="병원">병원</option>
                <option value="식사">식사</option><option value="기타">기타</option>
                <option value="조퇴(컨디션난조)">조퇴(컨디션난조)</option>
            </optgroup>
            <optgroup label="심야자습">
                <option value="심야자습 신청">심야자습 신청</option><option value="심야자습 취소">심야자습 취소</option>
            </optgroup>
            <optgroup label="규정 위반/지도">
                <option value="지각">지각</option><option value="입/퇴실 미준수">입/퇴실 미준수</option>
                <option value="핸드폰 미제출">핸드폰 미제출</option><option value="전자기기 무단사용">전자기기 무단사용</option>
                <option value="핸드폰 무단사용">핸드폰 무단사용</option><option value="무단이탈">무단이탈</option>
                <option value="타층/타관 무단출입">타층/타관 무단출입</option><option value="핸드폰/Wifi 무단반입">핸드폰/Wifi 무단반입</option>
                <option value="무단결석">무단결석</option><option value="원내대화">원내대화</option>
                <option value="무단지각">무단지각</option><option value="취침강제하원">취침강제하원</option>
                <option value="음식물섭취">음식물섭취</option>
            </optgroup>
        </select>

        <div id="scoreDiv" class="score">
            <label for="score">점수 (1~10점):</label>
            <select id="score">
                <option value="1">1점</option><option value="2">2점</option><option value="3">3점</option>
                <option value="4">4점</option><option value="5">5점</option><option value="6">6점</option>
                <option value="7">7점</option><option value="8">8점</option><option value="9">9점</option>
                <option value="10">10점</option>
            </select>
        </div>

        <label for="otherReason" id="otherReasonLabel" style="display:none;">기타 사유:</label>
        <textarea id="otherReason" placeholder="기타 사유를 입력하세요" style="display:none; height: 80px;"></textarea>

        <button type="submit">제출</button>
    </form>

    <div id="result">
        <table id="moveList">
            <thead>
                <tr>
                    <th>관</th><th>좌석번호</th><th>복귀교시</th><th>이동사유</th><th>입력날짜</th><th>입력시간</th><th>점수</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="error" id="errorMessage">기타 사유를 입력해주세요.</div>

    <div id="popupOverlay" class="popup-overlay"></div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <h2>🌙 심야자습 타겟 좌석 선택</h2>
            <p style="font-size: 14px; color: #555; margin-bottom: 15px;">
                본인 좌석: <span id="popupOriginalSeat" style="font-weight:bold; color:#336699;"></span> &nbsp;|&nbsp;
                희망교시: <span id="popupReturnTime" style="font-weight:bold;"></span> &nbsp;|&nbsp;
                사유: <span id="popupReason" style="font-weight:bold;"></span>
            </p>
            
            <div style="background-color: #f1f5f9; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 15px;">
                <label for="modalBuilding" style="display:inline-block; width: auto; margin:0 10px 0 0;">📌 이동할 관 선택:</label>
                <select id="modalBuilding" required style="width: 200px; padding: 8px; margin: 0; display: inline-block;">
                    <option value="">선택하세요</option>
                    <option value="7-1관">7-1관</option>
                    <option value="6-1관">6-1관 (준비중)</option>
                    <option value="5-1관">5-1관 (준비중)</option>
                </select>
                <span id="selectedTargetText" style="margin-left: 15px; font-weight:bold; color:#d9534f;">관을 선택해주세요.</span>
            </div>

            <div id="seatMapContainer" class="seat-map-container">
                <div id="seatGrid" class="seat-grid"></div>
            </div>
            
            <div class="popup-buttons">
                <button id="popupSubmitButton">최종 제출</button>
                <button id="popupCancelButton">취소</button>
            </div>
        </div>
    </div>

    <div id="alertPopup" class="popup" style="max-width: 400px; z-index: 2000;">
        <div class="popup-content">
            <h2>안내</h2>
            <p id="alertPopupMessage" style="line-height:1.6; margin: 20px 0;"></p>
            <div class="popup-buttons">
                <button id="alertPopupOkButton">확인</button>
            </div>
        </div>
    </div>

    <script>
    let moveList = [];
    let selectedTargetSeat = ""; 
    
    // ✅ 백엔드에서 명렬표 데이터를 받아와 저장할 빈 객체
    let studentGenderMap = {};

    // 🚨 여기에 본인의 Apps Script 웹앱 URL을 입력하세요!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYJ_wZv0U63C7_S44sNdzHJcSc5ftD1uNZOC-nNhL7Mm--NdV0ZZ6PRKjoW3m07vAs/exec";

    // ✅ 화면이 열릴 때 자동으로 구글 시트에서 명렬표를 가져옵니다. (캐시 무시 및 강력 방어 버전)
    window.onload = function() {
        console.log("구글 시트에서 성별 명렬표 데이터를 불러오는 중...");
        
        // 🚨 URL 끝에 현재 시간을 붙여서 브라우저의 '과거 접속 기억(캐시)'을 강제로 지웁니다.
        const fetchUrl = SCRIPT_URL + "?action=getGenderMap&t=" + new Date().getTime();
        
        fetch(fetchUrl)
            .then(response => response.text()) // 통신 에러 확인을 위해 텍스트로 안전하게 변환
            .then(text => {
                try {
                    studentGenderMap = JSON.parse(text); 
                    console.log("🎉 명렬표 로드 완료! 총 " + Object.keys(studentGenderMap).length + "명의 데이터를 가져왔습니다.");
                } catch (e) {
                    console.error("데이터 파싱 에러:", e);
                    alert("명렬표 시스템 오류입니다. 개발자 도구(F12)의 Console 탭을 확인해주세요.");
                }
            })
            .catch(error => {
                console.error("🚨 서버 통신 차단됨:", error);
                alert("구글 서버 접속이 브라우저 보안에 의해 차단되었습니다.");
            });
    };

    // ✅ [좌석표 데이터] 8칸 구조 (A, B, 통로, C, D, 통로, F, G)
    const seatData = {
        "7-1관": [
            ["7-1A01", "7-1B01", "", "7-1C01", "7-1D01", "", "7-1F01", "7-1G01"],
            ["7-1A02", "7-1B02", "", "7-1C02", "7-1D02", "", "7-1F02", "7-1G02"],
            ["7-1A03", "7-1B03", "", "7-1C03", "7-1D03", "", "7-1F03", "7-1G03"],
            ["7-1A04", "7-1B04", "", "7-1C04", "7-1D04", "", "7-1F04", "7-1G04"],
            ["7-1A05", "7-1B05", "", "7-1C05", "7-1D05", "", "7-1F05", "7-1G05"],
            ["7-1A06", "7-1B06", "", "7-1C06", "7-1D06", "", "7-1F06", "7-1G06"],
            ["7-1A07", "7-1B07", "", "7-1C07", "7-1D07", "", "7-1F07", "7-1G07"],
            ["7-1A08", "7-1B08", "", "7-1C08", "7-1D08", "", "7-1F08", ""],
            ["7-1A09", "7-1B09", "", "7-1C09", "7-1D09", "", "7-1F09", ""],
            ["7-1A10", "7-1B10", "", "7-1C10", "7-1D10", "", "7-1F10", ""],
            ["7-1A11", "7-1B11", "", "7-1C11", "7-1D11", "", "7-1F11", ""],
            ["7-1A12", "7-1B12", "", "7-1C12", "7-1D12", "", "7-1F12", ""],
            ["7-1A13", "7-1B13", "", "7-1C13", "7-1D13", "", "7-1F13", ""],
            ["",       "7-1B14", "", "7-1C14", "7-1D14", "", "7-1F14", ""],
            ["",       "7-1B15", "", "7-1C15", "7-1D15", "", "7-1F15", ""],
            ["",       "",       "", "7-1C16", "7-1D16", "", "7-1F16", ""],

            ["", "", "", "", "", "", "", ""], 
            ["1 페이지", "", "", "", "", "", "", ""],
            ["", "", "", "", "", "", "", "출입문"],
            ["", "", "", "", "", "", "", ""],

            ["",       "",       "", "7-1C34", "7-1D34", "", "7-1F34", "7-1G34"], 
            ["",       "",       "", "7-1C33", "7-1D33", "", "7-1F33", "7-1G33"], 
            ["",       "7-1B32", "", "7-1C32", "7-1D32", "", "7-1F32", "7-1G32"], 
            ["",       "7-1B31", "", "7-1C31", "7-1D31", "", "7-1F31", "7-1G31"], 
            ["",       "7-1B30", "", "7-1C30", "7-1D30", "", "7-1F30", "7-1G30"], 
            ["7-1A29", "7-1B29", "", "7-1C29", "7-1D29", "", "7-1F29", "7-1G29"], 
            ["7-1A28", "7-1B28", "", "7-1C28", "7-1D28", "", "7-1F28", "7-1G28"],
            ["7-1A27", "7-1B27", "", "7-1C27", "7-1D27", "", "7-1F27", "7-1G27"],
            ["7-1A26", "7-1B26", "", "7-1C26", "7-1D26", "", "7-1F26", "7-1G26"],
            ["7-1A25", "7-1B25", "", "7-1C25", "7-1D25", "", "7-1F25", "7-1G25"],
            ["7-1A24", "7-1B24", "", "7-1C24", "7-1D24", "", "7-1F24", "7-1G24"],
            ["7-1A23", "7-1B23", "", "7-1C23", "7-1D23", "", "7-1F23", "7-1G23"],
            ["7-1A22", "7-1B22", "", "7-1C22", "7-1D22", "", "7-1F22", "7-1G22"],
            ["7-1A21", "7-1B21", "", "7-1C21", "7-1D21", "", "7-1F21", "7-1G21"]
        ]
    };

    const nightStudyBlockedDates = new Set(["2026-01-31", "2026-02-01", "2026-03-01"]);

    function getKSTDateString(date = new Date()) {
        return new Intl.DateTimeFormat("sv-SE", { timeZone: "Asia/Seoul" }).format(date);
    }

    function isNightStudyBlocked() {
        const nowKST = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
        const day = nowKST.getDay();
        const today = getKSTDateString(nowKST);
        if (day === 0 || day === 6) return true;
        if (nightStudyBlockedDates.has(today)) return true;
        return false;
    }

    function showCenterAlert(message) {
        document.getElementById("alertPopupMessage").textContent = message;
        document.getElementById("alertPopup").style.display = "block";
        document.getElementById("popupOverlay").style.display = "block";
    }
    
    function closeCenterAlert() {
        document.getElementById("alertPopup").style.display = "none";
        if(document.getElementById("popup").style.display !== "block") {
            document.getElementById("popupOverlay").style.display = "none";
        }
    }
    document.getElementById("alertPopupOkButton").addEventListener("click", closeCenterAlert);

    const returnTimeSelect = document.getElementById("returnTime");
    const originalReturnTimeOptionsHTML = returnTimeSelect.innerHTML;

    function setReturnTimeOptionsForNightStudy(isNightStudy) {
        if (isNightStudy) {
            returnTimeSelect.value = "";
            returnTimeSelect.innerHTML = `
                <option value="">선택하세요</option>
                <option value="9">9교시</option>
                <option value="10">10교시</option>
                <option value="복귀안함">복귀안함</option>
            `;
        } else {
            const prev = returnTimeSelect.value;
            returnTimeSelect.innerHTML = originalReturnTimeOptionsHTML;
            if ([...returnTimeSelect.options].some(o => o.value === prev)) {
                returnTimeSelect.value = prev;
            } else {
                returnTimeSelect.value = "";
            }
        }
    }

    const fixedScores = {
        "무단이탈": 10, "전자기기 무단사용": 10, "핸드폰/Wifi 무단반입": 10, "핸드폰 무단사용": 7,
        "무단결석": 7, "타층/타관 무단출입": 5, "원내대화": 5, "무단지각": 5, "취침강제하원": 3,
        "음식물섭취": 3, "입/퇴실 미준수": 3, "핸드폰 미제출": 10,
    };

    function refreshMoveList() {
        const tableBody = document.querySelector("#moveList tbody");
        tableBody.innerHTML = "";
        moveList.forEach(moveData => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${moveData.building}</td>
                <td>${moveData.seatNumber}</td>
                <td>${moveData.returnTime}교시</td>
                <td>${moveData.reason}</td>
                <td>${moveData.inputDate}</td>
                <td>${moveData.inputTime}</td>
                <td>${moveData.score || '-'}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    document.getElementById("reason").addEventListener("change", function() {
        const value = this.value;
        const isNightStudy = (value === "심야자습 신청" || value === "심야자습 취소");
        setReturnTimeOptionsForNightStudy(isNightStudy);

        const scoreReasons = ["무단이탈","전자기기 무단사용","핸드폰/Wifi 무단반입","핸드폰 무단사용",
            "무단결석","타층/타관 무단출입","원내대화","무단지각","취침강제하원","음식물섭취","입/퇴실 미준수","핸드폰 미제출"];

        document.getElementById("scoreDiv").style.display = scoreReasons.includes(value) ? "block" : "none";

        if (value === "기타") {
            document.getElementById("otherReason").style.display = "block";
            document.getElementById("otherReasonLabel").style.display = "block";
        } else {
            document.getElementById("otherReason").style.display = "none";
            document.getElementById("otherReasonLabel").style.display = "none";
            document.getElementById("errorMessage").style.display = "none";
        }
        if (fixedScores[value]) {
            document.getElementById("score").value = fixedScores[value];
        } else {
            document.getElementById("score").value = '';
        }
    });

    /* ===============================
       🚨 모달 렌더링 (사전 클릭 차단 및 시각적 비활성화 로직 추가)
       =============================== */
    document.getElementById("modalBuilding").addEventListener("change", function() {
        const building = this.value;
        const container = document.getElementById("seatMapContainer");
        const grid = document.getElementById("seatGrid");
        
        selectedTargetSeat = ""; 
        document.getElementById("selectedTargetText").textContent = "지도가 로드되었습니다. 아래에서 좌석을 클릭해주세요 ⬇️";
        document.getElementById("selectedTargetText").style.color = "#336699";

        if (!building || !seatData[building]) {
            container.style.display = "none";
            grid.innerHTML = "";
            return;
        }

        // 현재 폼에 입력된 본인 정보로 성별 파악
        const originalBuilding = document.getElementById("building").value.replace("관", "").trim();
        const seatLetter = document.getElementById("seatNumber").value.trim();
        const seatNum = document.getElementById("seatNumber2").value.trim();
        const studentKey = `${originalBuilding}${seatLetter}${seatNum}`;
        
        // 동적으로 불러온 studentGenderMap 객체에서 성별 검색
        const gender = studentGenderMap[studentKey];
        const reason = document.getElementById("reason").value;

        const layout = seatData[building];
        grid.style.gridTemplateColumns = `42px 42px 14px 42px 42px 14px 42px 42px`; 
        grid.innerHTML = ""; 
        
        layout.forEach((row, rowIndex) => {
            row.forEach((cell, colIndex) => {
                const div = document.createElement("div");
                div.classList.add("seat-cell");
                const cellText = cell.trim();

                // 절대 좌표 설정
                div.style.gridRow = (rowIndex + 1).toString();
                div.style.gridColumn = (colIndex + 1).toString();

                const isAisleCol = (colIndex === 2 || colIndex === 5);
                const isTopBlock = rowIndex <= 15; 
                const isBottomBlock = rowIndex >= 20; 

                if (isAisleCol && (isTopBlock || isBottomBlock)) { 
                    div.classList.add("aisle");
                    grid.appendChild(div);
                    return; 
                }

                if (cellText === "") {
                    div.classList.add("empty"); 
                } else if (cellText.includes("출입문")) {
                    div.classList.add("door");
                    div.innerHTML = "🚪<br>출입문";
                    div.style.gridColumn = "7 / 9"; 
                    div.style.gridRow = `${rowIndex + 1} / span 2`; 
                } else if (cellText.includes("페이지")) {
                    div.classList.add("title-text");
                    div.textContent = cellText;
                    div.style.gridColumn = "1 / -1"; 
                } else {
                    div.classList.add("seat");
                    div.textContent = cellText;

                    // 🚨 본인 성별에 맞지 않는 좌석은 회색으로 비활성화하여 클릭을 막습니다.
                    let isAllowed = true;
                    if (reason === "심야자습 신청" || reason === "심야자습 취소") {
                        const targetNum = parseInt(cellText.slice(-2), 10);
                        if (gender === "남" && targetNum > 16) isAllowed = false;
                        if (gender === "여" && (targetNum < 21 || targetNum > 36)) isAllowed = false;
                    }

                    if (!isAllowed) {
                        // 선택 불가 좌석 (클릭 이벤트 추가 안 함 + CSS 비활성화)
                        div.classList.add("disabled");
                    } else {
                        // 정상 선택 가능 좌석
                        div.addEventListener("click", function() {
                            const prevSelected = grid.querySelector(".selected");
                            if (prevSelected) prevSelected.classList.remove("selected");
                            
                            this.classList.add("selected");
                            selectedTargetSeat = cellText;
                            
                            document.getElementById("selectedTargetText").innerHTML = `✅ 선택 완료: <span style='font-size:18px; text-decoration:underline;'>${selectedTargetSeat}</span>`;
                            document.getElementById("selectedTargetText").style.color = "#274e13";
                        });
                    }
                }
                grid.appendChild(div);
            });
        });
        container.style.display = "block";
    });

    document.getElementById("moveForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const building = document.getElementById("building").value;
        const seatLetter = document.getElementById("seatNumber").value;
        const seatNum = document.getElementById("seatNumber2").value;
        const returnTime = document.getElementById("returnTime").value;
        const reason = document.getElementById("reason").value;
        const otherReason = document.getElementById("otherReason").value;
        const score = parseInt(document.getElementById("score").value) || null;

        if (reason === "심야자습 신청" || reason === "심야자습 취소") {
            if (isNightStudyBlocked()) {
                showCenterAlert("토요일,일요일 및 지정된 날짜에는 심야자습 신청/취소가 불가능합니다.");
                return;
            }
            if (!["9","10","복귀안함"].includes(returnTime)) {
                showCenterAlert("심야자습 신청/취소는 복귀교시를 9교시 또는 10교시(또는 복귀안함)만 선택할 수 있습니다.");
                return;
            }
            if (!building || !seatLetter || !seatNum || !returnTime) {
                showCenterAlert("관, 좌석번호, 희망교시는 반드시 입력해야 합니다.");
                return;
            }

            // 🚨 명렬표 사전 검증: 구글 시트 데이터에 없는 학생은 모달창 열기를 거부함
            const cleanBuilding = building.replace("관", "").trim(); 
            const studentKey = `${cleanBuilding}${seatLetter.trim()}${seatNum.trim()}`; 
            
            if (!studentGenderMap[studentKey]) {
                alert(`[${studentKey}] 좌석은 성별 명렬표에 등록되지 않았습니다.\n관리자에게 문의해주세요.`);
                return;
            }

            document.getElementById("popupOriginalSeat").textContent = `${building} ${seatLetter}${seatNum}`;
            document.getElementById("popupReturnTime").textContent = returnTime;
            document.getElementById("popupReason").textContent = reason;

            document.getElementById("modalBuilding").value = "";
            document.getElementById("seatMapContainer").style.display = "none";
            document.getElementById("selectedTargetText").textContent = "관을 선택해주세요.";
            document.getElementById("selectedTargetText").style.color = "#d9534f";
            selectedTargetSeat = "";

            document.getElementById("popupOverlay").style.display = "block";
            document.getElementById("popup").style.display = "block";

            const popupSubmitButton = document.getElementById("popupSubmitButton");
            const popupCancelButton = document.getElementById("popupCancelButton");

            popupSubmitButton.removeEventListener("click", handlePopupSubmit);
            popupSubmitButton.addEventListener("click", handlePopupSubmit);

            popupCancelButton.removeEventListener("click", handlePopupCancel);
            popupCancelButton.addEventListener("click", handlePopupCancel);

        } else if (reason === "기타" && !otherReason.trim()) {
            document.getElementById("errorMessage").style.display = "block";
            setTimeout(() => { document.getElementById("errorMessage").style.display = "none"; }, 2000);
            return;
        } else {
            document.getElementById("errorMessage").style.display = "none";
            const originalSeatCombo = seatLetter + seatNum;
            submitMoveData(building, originalSeatCombo, returnTime, reason, otherReason, score);
        }
    });

    function handlePopupSubmit() {
        const targetBuilding = document.getElementById("modalBuilding").value;

        if (!targetBuilding || !selectedTargetSeat) {
            alert("이동하실 관을 선택하고, 지도에서 이동할 좌석을 클릭해주세요!");
            return;
        }

        const returnTime = document.getElementById("returnTime").value;
        const reason = document.getElementById("reason").value;
        const score = parseInt(document.getElementById("score").value) || null;

        const originalBuilding = document.getElementById("building").value;
        const seatLetter = document.getElementById("seatNumber").value;
        const seatNum = document.getElementById("seatNumber2").value;
        const originalSeatCombo = seatLetter + seatNum;
        const originalSeatInfo = `(원래좌석: ${originalBuilding} ${originalSeatCombo})`;
        
        submitMoveData(targetBuilding, selectedTargetSeat, returnTime, reason, originalSeatInfo, score);
        
        document.getElementById("popup").style.display = "none";
        document.getElementById("popupOverlay").style.display = "none";
    }

    function handlePopupCancel() {
        document.getElementById("popup").style.display = "none";
        document.getElementById("popupOverlay").style.display = "none";
    }

    function submitMoveData(building, seatNumber, returnTime, reason, otherReason, score) {
        const now = new Date();
        const inputDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        const inputTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

        const moveData = {
            building,
            seatNumber,
            returnTime,
            reason: reason === "기타" ? otherReason : reason,
            score: ["입/퇴실 미준수","핸드폰 미제출","전자기기 무단사용","핸드폰 무단사용","무단이탈","타층/타관 무단출입","핸드폰/Wifi 무단반입","무단결석","원내대화","무단지각","취침강제하원","음식물섭취",].includes(reason) ? score : null,
            inputDate,
            inputTime
        };
        
        if (reason === "심야자습 신청" || reason === "심야자습 취소") {
            moveData.reason = `${reason} ${otherReason}`;
        }

        moveList.push(moveData);
        moveList.sort((a,b) => b.inputTime.localeCompare(a.inputTime));
        refreshMoveList();

        document.getElementById("moveForm").reset();
        document.getElementById("scoreDiv").style.display = "none";
        document.getElementById("otherReason").style.display = "none";
        document.getElementById("otherReasonLabel").style.display = "none";

        setReturnTimeOptionsForNightStudy(false);

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(moveData)
        }).catch(err => console.error("제출 에러:", err));
        
        // 🚨 요청하신 대로 "성공적으로 제출되었습니다." 팝업창(alert)을 삭제했습니다!
    }

    // 🚨 요청하신 대로 "테이블을 초기화하시겠습니까?" 묻지 않고 바로 초기화합니다!
    function resetTable() {
        moveList = [];
        refreshMoveList();
    }
    </script>
</body>
</html>
