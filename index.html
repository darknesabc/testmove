<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>러셀 테스트 이동일지 작성</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
        h1 { color: #336699; font-size: 24px; }
        form {
            display: inline-block; text-align: left; border: 1px solid #ccc;
            padding: 20px; width: 100%; max-width: 500px; box-sizing: border-box;
            background-color: #f9f9f9; border-radius: 8px;
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box;
            font-size: 16px; border-radius: 4px; border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px; background-color: #336699; color: #fff;
            border: none; cursor: pointer; width: 100%; max-width: 120px; border-radius: 4px;
        }
        button:hover { background-color: #28597b; }
        #resetButton {
            margin: 10px 0; float: left; width: auto; padding: 8px 16px;
            background-color: #ccc; cursor: pointer;
        }
        table {
            margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 700px;
            border-radius: 8px; overflow: hidden;
        }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        thead { background-color: #f2f2f2; font-weight: bold; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #f1f1f1; }
        .error {
            color: red; margin-top: 10px; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background-color: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            font-size: 18px; display: none;
        }
        .score { display: none; }

        /* 팝업 스타일 */
        .popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 80%; max-width: 500px;
            background-color: white; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            z-index: 1000; padding: 20px;
        }
        .popup-content { text-align: center; }
        .popup h2 { margin-bottom: 15px; color: #336699; }
        .popup-buttons { margin-top: 20px; }
        .popup button {
            padding: 10px 20px; font-size: 16px; margin: 0 10px; border-radius: 4px;
            cursor: pointer; background-color: #336699; color: white; border: none;
        }
        .popup button:hover { background-color: #28597b; }
        .popup button#popupCancelButton { background-color: #ccc; }
        .popup button#popupCancelButton:hover { background-color: #aaa; }
        #alertPopup .popup-buttons button { margin: 0; }

        /* 심야자습 신청 시 기존 좌석번호 select 숨김 */
        #seatNumber, #seatNumber2 {
            display: inline-block;
        }
        .night-study #seatNumber, .night-study #seatNumber2 {
            display: none;
        }

        @media (max-width: 768px) {
            form { padding: 15px; }
            button { width: 100%; }
            table, th, td { font-size: 14px; }
            select, textarea { padding: 14px; font-size: 18px; }
        }
        @media (max-width: 480px) {
            body { margin: 10px; }
            h1 { font-size: 20px; }
            select, button { font-size: 14px; }
            th, td { padding: 10px; }
        }

        /* 좌석선택 모달 좌석 버튼 스타일 */
        #seatMap button {
            width: 56px;
            height: 40px;
            border-radius: 6px;
            border: 1px solid #aaa;
            background-color: #e0e7ff;
            cursor: pointer;
            font-size: 12px;
            user-select: none;
        }
        #seatMap button.selected {
            background-color: #336699;
            color: white;
        }
    </style>
</head>
<body>
    <h1>러셀 이동일지&교육점수 작성</h1>
    <button id="resetButton" onclick="resetTable()">테이블 초기화</button>

    <form id="moveForm">
        <label for="building">관:</label>
        <select id="building" required>
            <option value="">선택하세요</option>
            <option value="4-1관">4-1관</option>
            <option value="4-2관">4-2관</option>
            <option value="4-3관">4-3관</option>
            <option value="4-4관">4-4관</option>
            <option value="4-5관">4-5관</option>
        </select>

        <label for="seatNumber">좌석번호:</label>
        <select id="seatNumber" required>
            <option value="">선택하세요</option>
            <optgroup label="A~I">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="F">F</option>
                <option value="G">G</option>
                <option value="H">H</option>
                <option value="I">I</option>
            </optgroup>
        </select>

        <select id="seatNumber2" required>
            <option value="">선택하세요</option>
            <optgroup label="1~40">
                <option value="01">01</option>
                <option value="02">02</option>
                <option value="03">03</option>
                <option value="04">04</option>
                <option value="05">05</option>
                <option value="06">06</option>
                <option value="07">07</option>
                <option value="08">08</option>
                <option value="09">09</option>
                <option value="10">10</option>
                <option value="11">11</option>
            </optgroup>
        </select>

        <label for="returnTime">복귀교시:</label>
        <select id="returnTime" required>
            <option value="">선택하세요</option>
            <option value="1">1교시</option>
            <option value="2">2교시</option>
            <option value="3">3교시</option>
            <option value="4">4교시</option>
            <option value="5">5교시</option>
            <option value="6">6교시</option>
            <option value="7">7교시</option>
            <option value="8">8교시</option>
            <option value="9">9교시</option>
            <option value="10">10교시</option>
            <option value="복귀안함">복귀안함</option>
        </select>

        <label for="reason">이동사유:</label>
<select id="reason" required>
  <option value="">선택하세요</option>

  <optgroup label="일반 이동">
    <option value="화장실/정수기">화장실/정수기</option>
    <option value="튜터 질의응답">튜터 질의응답</option>
    <option value="외부 학원/과외/보충">외부 학원/과외/보충</option>
    <option value="자료수령">자료수령</option>
    <option value="가족 행사">가족 행사</option>
    <option value="병원">병원</option>
    <option value="식사">식사</option>
    <option value="기타">기타</option>
    <option value="조퇴(컨디션난조)">조퇴(컨디션난조)</option>
  </optgroup>

  <optgroup label="심야자습">
    <option value="심야자습 신청">심야자습 신청</option>
    <option value="심야자습 취소">심야자습 취소</option>
  </optgroup>

  <optgroup label="규정 위반/지도">
    <option value="지각">지각</option>
    <option value="입/퇴실 미준수">입/퇴실 미준수</option>
    <option value="핸드폰 미제출">핸드폰 미제출</option>
    <option value="전자기기 무단사용">전자기기 무단사용</option>
    <option value="핸드폰 무단사용">핸드폰 무단사용</option>
    <option value="무단이탈">무단이탈</option>
    <option value="타층/타관 무단출입">타층/타관 무단출입</option>
    <option value="핸드폰/Wifi 무단반입">핸드폰/Wifi 무단반입</option>
    <option value="무단결석">무단결석</option>
    <option value="원내대화">원내대화</option>
    <option value="무단지각">무단지각</option>
    <option value="취침강제하원">취침강제하원</option>
    <option value="음식물섭취">음식물섭취</option>
  </optgroup>
</select>

        <div id="scoreDiv" class="score">
            <label for="score">점수 (1~10점):</label>
            <select id="score">
                <option value="1">1점</option>
                <option value="2">2점</option>
                <option value="3">3점</option>
                <option value="4">4점</option>
                <option value="5">5점</option>
                <option value="6">6점</option>
                <option value="7">7점</option>
                <option value="8">8점</option>
                <option value="9">9점</option>
                <option value="10">10점</option>
            </select>
        </div>

        <label for="otherReason" id="otherReasonLabel" style="display:none;">기타 사유:</label>
        <textarea id="otherReason" placeholder="기타 사유를 입력하세요" style="display:none; height: 100px;"></textarea>

        <button type="submit">제출</button>
    </form>

    <div id="result">
        <table id="moveList">
            <thead>
                <tr>
                    <th>관</th>
                    <th>좌석번호</th>
                    <th>복귀교시</th>
                    <th>이동사유</th>
                    <th>입력날짜</th>
                    <th>입력시간</th>
                    <th>점수</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="error" id="errorMessage">기타 사유를 입력해주세요.</div>

    <!-- ✅ 심야자습 신청/취소 팝업창 -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <h2>심야자습 신청/취소</h2>
            <p>관: <span id="popupBuilding"></span></p>
            <p>좌석번호: <span id="popupSeatNumber"></span></p>
            <p>희망교시: <span id="popupReturnTime"></span></p>
            <p>사유: <span id="popupReason"></span></p>
            <div class="popup-buttons">
                <button id="popupSubmitButton">제출</button>
                <button id="popupCancelButton">취소</button>
            </div>
        </div>
    </div>

    <!-- ✅ 중앙 안내 팝업(확인 버튼 1개) -->
    <div id="alertPopup" class="popup">
        <div class="popup-content">
            <h2>안내</h2>
            <p id="alertPopupMessage" style="line-height:1.6;"></p>
            <div class="popup-buttons">
                <button id="alertPopupOkButton">확인</button>
            </div>
        </div>
    </div>

    <!-- 심야자습 좌석 선택 모달 -->
    <div id="seatSelectModal" class="popup" style="width: 90%; max-width: 700px;">
        <div class="popup-content" style="text-align: left;">
            <h2>심야자습 좌석 선택</h2>
            <p>좌석을 선택해주세요.</p>
            <div id="seatMap" style="display: grid; grid-template-columns: repeat(8, 60px); gap: 8px; max-height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; border-radius: 8px; background: #f5faff;"></div>
            <p style="margin-top: 10px;">
                선택 좌석: <span id="selectedSeatDisplay">없음</span>
            </p>
            <label for="modalReturnTime">희망 복귀 교시 선택:</label>
            <select id="modalReturnTime" style="width: 100%; padding: 8px; margin-top: 5px; font-size: 16px;">
                <option value="">선택하세요</option>
                <option value="9">9교시</option>
                <option value="10">10교시</option>
                <option value="복귀안함">복귀안함</option>
            </select>
            <div class="popup-buttons" style="text-align: center; margin-top: 15px;">
                <button id="seatModalSubmit">제출</button>
                <button id="seatModalCancel">취소</button>
            </div>
        </div>
    </div>

    <script>
    let moveList = [];

    /* ===============================
       심야자습 신청/취소 차단 설정
       - 토/일 차단
       - 특정 날짜(리스트) 차단
       =============================== */

    // ❌ 심야자습 차단 날짜(YYYY-MM-DD)
    const nightStudyBlockedDates = new Set([
        "2026-01-31",
        "2026-02-01",
        "2026-03-01"
    ]);

    // 한국시간 기준 YYYY-MM-DD 반환
    function getKSTDateString(date = new Date()) {
        return new Intl.DateTimeFormat("sv-SE", {
            timeZone: "Asia/Seoul"
        }).format(date);
    }

    // 심야자습 차단 여부 판단 (토/일 + 특정 날짜)
    function isNightStudyBlocked() {
        const nowKST = new Date(
            new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" })
        );

        const day = nowKST.getDay(); // 0=일요일, 6=토요일
        const today = getKSTDateString(nowKST);

        // 1) 토요일/일요일 차단
        if (day === 0 || day === 6) return true;

        // 2) 특정 날짜 차단
        if (nightStudyBlockedDates.has(today)) return true;

        return false;
    }

    // ✅ 중앙 안내 팝업 띄우기/닫기
    function showCenterAlert(message) {
        document.getElementById("alertPopupMessage").textContent = message;
        document.getElementById("alertPopup").style.display = "block";
    }
    function closeCenterAlert() {
        document.getElementById("alertPopup").style.display = "none";
    }
    document.getElementById("alertPopupOkButton").addEventListener("click", closeCenterAlert);

    /* ===============================
       ✅ 심야자습 선택 시 복귀교시를 9/10만 선택 가능하게
       - 다른 사유로 바꾸면 다시 전체 교시 복구
       =============================== */
    const returnTimeSelect = document.getElementById("returnTime");
    const originalReturnTimeOptionsHTML = returnTimeSelect.innerHTML; // 전체 옵션 저장

    function setReturnTimeOptionsForNightStudy(isNightStudy) {
        if (isNightStudy) {
            // 현재 선택값 초기화(혹시 1~8 선택되어 있던 경우)
            returnTimeSelect.value = "";

            // 9,10,복귀안함 만 옵션으로 변경
            returnTimeSelect.innerHTML = `
                <option value="">선택하세요</option>
                <option value="9">9교시</option>
                <option value="10">10교시</option>
                <option value="복귀안함">복귀안함</option>
            `;
        } else {
            returnTimeSelect.innerHTML = originalReturnTimeOptionsHTML;
        }
    }

    /* ===============================
       기타 사유 입력 토글
       점수 입력 토글
       좌석번호 셀렉트 토글
       =============================== */
    const reasonSelect = document.getElementById("reason");
    const otherReasonTextarea = document.getElementById("otherReason");
    const otherReasonLabel = document.getElementById("otherReasonLabel");
    const scoreDiv = document.getElementById("scoreDiv");
    const seatNumberSelect = document.getElementById("seatNumber");
    const seatNumber2Select = document.getElementById("seatNumber2");
    const moveForm = document.getElementById("moveForm");

    reasonSelect.addEventListener("change", () => {
        const reason = reasonSelect.value;

        // 기타 사유 표시
        if (reason === "기타") {
            otherReasonTextarea.style.display = "block";
            otherReasonLabel.style.display = "block";
        } else {
            otherReasonTextarea.style.display = "none";
            otherReasonLabel.style.display = "none";
        }

        // 점수 입력 표시 (규정 위반/지도)
        const scoreReasons = [
            "지각", "입/퇴실 미준수", "핸드폰 미제출", "전자기기 무단사용", "핸드폰 무단사용",
            "무단이탈", "타층/타관 무단출입", "핸드폰/Wifi 무단반입", "무단결석",
            "원내대화", "무단지각", "취침강제하원", "음식물섭취"
        ];
        if (scoreReasons.includes(reason)) {
            scoreDiv.style.display = "block";
        } else {
            scoreDiv.style.display = "none";
        }

        // 심야자습 선택 시 좌석번호 select 숨김 및 모달 준비
        if (reason === "심야자습 신청" || reason === "심야자습 취소") {
            seatNumberSelect.style.display = "none";
            seatNumber2Select.style.display = "none";
            moveForm.classList.add("night-study");

            createSeatMap(); // 좌석맵 생성
            selectedSeat = null;
            document.getElementById("selectedSeatDisplay").textContent = "없음";

            setReturnTimeOptionsForNightStudy(true);
        } else {
            seatNumberSelect.style.display = "inline-block";
            seatNumber2Select.style.display = "inline-block";
            moveForm.classList.remove("night-study");
            setReturnTimeOptionsForNightStudy(false);
        }
    });

    /* ===============================
       좌석 데이터 및 좌석맵 생성
       =============================== */
    const nightStudySeats = [
        "7-1A01","7-1A02","7-1A03","7-1A04","7-1A05","7-1A06","7-1A07","7-1A08","7-1A09","7-1A10","7-1A11","7-1A12","7-1A13",
        "7-1B01","7-1B02","7-1B03","7-1B04","7-1B05","7-1B06","7-1B07","7-1B08","7-1B09","7-1B10","7-1B11","7-1B12","7-1B13","7-1B14","7-1B15",
    ];

    const seatMapDiv = document.getElementById("seatMap");
    let selectedSeat = null;

    function createSeatMap() {
        seatMapDiv.innerHTML = ""; // 초기화

        nightStudySeats.forEach(seat => {
            const btn = document.createElement("button");
            btn.textContent = seat;
            btn.classList.remove("selected");

            btn.addEventListener("click", () => {
                selectedSeat = seat;
                document.getElementById("selectedSeatDisplay").textContent = selectedSeat;

                // 선택한 좌석 스타일 초기화 후 강조
                Array.from(seatMapDiv.children).forEach(child => child.classList.remove("selected"));
                btn.classList.add("selected");
            });

            seatMapDiv.appendChild(btn);
        });
    }

    /* ===============================
       폼 제출 시 심야자습일 때 좌석 모달 띄우기
       =============================== */
    moveForm.addEventListener("submit", function(event) {
        event.preventDefault();

        const building = document.getElementById("building").value;
        const reason = document.getElementById("reason").value;

        let seatNumber = null;
        if (reason === "심야자습 신청" || reason === "심야자습 취소") {
            seatNumber = selectedSeat;
            if (!seatNumber) {
                showCenterAlert("좌석을 선택해주세요.");
                return;
            }
        } else {
            seatNumber = document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
            if (!seatNumber || seatNumber.length < 2) {
                showCenterAlert("좌석번호를 선택해주세요.");
                return;
            }
        }

        const returnTime = (reason === "심야자습 신청" || reason === "심야자습 취소")
            ? document.getElementById("modalReturnTime").value || document.getElementById("returnTime").value
            : document.getElementById("returnTime").value;

        const otherReason = document.getElementById("otherReason").value.trim();
        const score = parseInt(document.getElementById("score").value) || null;

        // 심야자습 차단 확인
        if (reason === "심야자습 신청" || reason === "심야자습 취소") {
            if (isNightStudyBlocked()) {
                showCenterAlert("토요일,일요일 및 지정된 날짜에는 심야자습 신청/취소가 불가능합니다.");
                return;
            }
            if (!["9","10","복귀안함"].includes(returnTime)) {
                showCenterAlert("심야자습 신청/취소는 복귀교시를 9교시 또는 10교시(또는 복귀안함)만 선택할 수 있습니다.");
                return;
            }
            if (!building || !seatNumber || !returnTime) {
                showCenterAlert("관, 좌석번호, 희망교시는 반드시 입력해야 합니다.");
                return;
            }

            // 심야자습 신청 팝업 띄우기
            document.getElementById("popupBuilding").textContent = building;
            document.getElementById("popupSeatNumber").textContent = seatNumber;
            document.getElementById("popupReturnTime").textContent = returnTime;
            document.getElementById("popupReason").textContent = reason;

            document.getElementById("popup").style.display = "block";

        } else if (reason === "기타" && otherReason === "") {
            document.getElementById("errorMessage").style.display = "block";
            return;
        } else {
            document.getElementById("errorMessage").style.display = "none";
            submitMoveData(building, seatNumber, returnTime, reason, otherReason, score);
        }
    });

    /* ===============================
       심야자습 좌석선택 모달 제출/취소 버튼 동작
       =============================== */
    document.getElementById("seatModalSubmit").addEventListener("click", () => {
        const modalReturnTime = document.getElementById("modalReturnTime").value;
        if (!selectedSeat) {
            showCenterAlert("좌석을 선택해주세요.");
            return;
        }
        if (!modalReturnTime) {
            showCenterAlert("희망 복귀 교시를 선택해주세요.");
            return;
        }

        // 폼 내 복귀교시도 업데이트 (숨겨진 필드에)
        document.getElementById("returnTime").value = modalReturnTime;

        // 모달 닫기
        document.getElementById("seatSelectModal").style.display = "none";

        // 심야자습 신청 팝업 띄우기
        document.getElementById("popupBuilding").textContent = document.getElementById("building").value;
        document.getElementById("popupSeatNumber").textContent = selectedSeat;
        document.getElementById("popupReturnTime").textContent = modalReturnTime;
        document.getElementById("popupReason").textContent = document.getElementById("reason").value;

        document.getElementById("popup").style.display = "block";
    });

    document.getElementById("seatModalCancel").addEventListener("click", () => {
        document.getElementById("seatSelectModal").style.display = "none";
    });

    /* ===============================
       심야자습 신청 팝업 취소/제출 버튼
       =============================== */
    document.getElementById("popupCancelButton").addEventListener("click", () => {
        document.getElementById("popup").style.display = "none";
    });

    document.getElementById("popupSubmitButton").addEventListener("click", () => {
        const building = document.getElementById("popupBuilding").textContent;
        const seatNumber = document.getElementById("popupSeatNumber").textContent;
        const returnTime = document.getElementById("popupReturnTime").textContent;
        const reason = document.getElementById("popupReason").textContent;

        // 심야자습 신청/취소시 점수는 0점 처리
        submitMoveData(building, seatNumber, returnTime, reason, "", 0);

        document.getElementById("popup").style.display = "none";
    });

    /* ===============================
       기타 함수
       =============================== */

    // 서버에 저장 + 테이블 갱신 시뮬레이션
    function submitMoveData(building, seatNumber, returnTime, reason, otherReason, score) {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, "0");
        const dd = String(now.getDate()).padStart(2, "0");
        const hh = String(now.getHours()).padStart(2, "0");
        const min = String(now.getMinutes()).padStart(2, "0");

        const inputDate = `${yyyy}-${mm}-${dd}`;
        const inputTime = `${hh}:${min}`;

        const displayReason = (reason === "기타") ? otherReason : reason;
        const displayScore = score === null || score === undefined ? "-" : score;

        const newEntry = {
            building,
            seatNumber,
            returnTime,
            reason: displayReason,
            inputDate,
            inputTime,
            score: displayScore
        };

        moveList.push(newEntry);
        updateTable();

        // 제출 후 초기화
        resetForm();
    }

    // 테이블 갱신
    function updateTable() {
        const tbody = document.querySelector("#moveList tbody");
        tbody.innerHTML = "";

        moveList.forEach(item => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${item.building}</td>
                <td>${item.seatNumber}</td>
                <td>${item.returnTime}</td>
                <td>${item.reason}</td>
                <td>${item.inputDate}</td>
                <td>${item.inputTime}</td>
                <td>${item.score}</td>
            `;

            tbody.appendChild(tr);
        });
    }

    // 폼 초기화
    function resetForm() {
        moveForm.reset();
        otherReasonTextarea.style.display = "none";
        otherReasonLabel.style.display = "none";
        scoreDiv.style.display = "none";
        seatNumberSelect.style.display = "inline-block";
        seatNumber2Select.style.display = "inline-block";
        moveForm.classList.remove("night-study");
        setReturnTimeOptionsForNightStudy(false);
        selectedSeat = null;
        document.getElementById("selectedSeatDisplay").textContent = "없음";
        document.getElementById("errorMessage").style.display = "none";
    }

    // 테이블 초기화 버튼 클릭
    function resetTable() {
        if (confirm("테이블을 초기화하시겠습니까?")) {
            moveList = [];
            updateTable();
        }
    }

    </script>
</body>
</html>
