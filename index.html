<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>러셀 테스트 이동일지 작성</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
        h1 { color: #336699; font-size: 24px; }
        form {
            display: inline-block; text-align: left; border: 1px solid #ccc;
            padding: 20px; width: 100%; max-width: 500px; box-sizing: border-box;
            background-color: #f9f9f9; border-radius: 8px;
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box;
            font-size: 16px; border-radius: 4px; border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px; background-color: #336699; color: #fff;
            border: none; cursor: pointer; width: 100%; max-width: 120px; border-radius: 4px;
        }
        button:hover { background-color: #28597b; }
        #resetButton {
            margin: 10px 0; float: left; width: auto; padding: 8px 16px;
            background-color: #ccc; cursor: pointer;
        }
        table {
            margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 700px;
            border-radius: 8px; overflow: hidden;
        }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        thead { background-color: #f2f2f2; font-weight: bold; }
        tbody tr:nth-child(even) { background-color: #f9f9f9; }
        tbody tr:hover { background-color: #f1f1f1; }
        .error {
            color: red; margin-top: 10px; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background-color: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            font-size: 18px; display: none;
        }
        .score { display: none; }

        /* 팝업 스타일 */
        .popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 80%; max-width: 500px;
            background-color: white; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            z-index: 1000; padding: 20px;
        }
        .popup-content { text-align: center; }
        .popup h2 { margin-bottom: 15px; color: #336699; }
        .popup-buttons { margin-top: 20px; }
        .popup button {
            padding: 10px 20px; font-size: 16px; margin: 0 10px; border-radius: 4px;
            cursor: pointer; background-color: #336699; color: white; border: none;
        }
        .popup button:hover { background-color: #28597b; }
        .popup button#popupCancelButton { background-color: #ccc; }
        .popup button#popupCancelButton:hover { background-color: #aaa; }
        #alertPopup .popup-buttons button { margin: 0; }

        /* 좌석 선택 모달 스타일 */
        #seatSelectModal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; max-height: 80vh;
            background: white; border-radius: 8px; box-shadow: 0 0 25px rgba(0,0,0,0.3);
            z-index: 1100; overflow-y: auto; padding: 20px;
            text-align: center;
        }
        #seatSelectModal h2 {
            margin-bottom: 15px; color: #336699;
        }
        .seat-map {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            justify-items: center;
            margin-bottom: 15px;
        }
        .seat {
            width: 40px;
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 6px;
            line-height: 40px;
            cursor: pointer;
            user-select: none;
            background-color: #f9f9f9;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .seat.selected {
            background-color: #336699;
            color: white;
            border-color: #28597b;
        }
        .seat.disabled {
            background-color: #ddd;
            color: #888;
            cursor: not-allowed;
            border-color: #ccc;
        }
        #selectedSeatDisplay {
            font-weight: bold;
            margin-bottom: 15px;
        }
        #modalReturnTime {
            width: 100%; padding: 12px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        #seatSelectModal button {
            width: 120px;
            margin: 0 10px;
        }

        @media (max-width: 768px) {
            form { padding: 15px; }
            button { width: 100%; }
            table, th, td { font-size: 14px; }
            select, textarea { padding: 14px; font-size: 18px; }
            .seat {
                width: 32px;
                height: 32px;
                line-height: 32px;
                font-size: 12px;
            }
        }
        @media (max-width: 480px) {
            body { margin: 10px; }
            h1 { font-size: 20px; }
            select, button { font-size: 14px; }
            th, td { padding: 10px; }
            .seat-map {
                grid-template-columns: repeat(7, 1fr);
                gap: 6px;
            }
            .seat {
                width: 28px;
                height: 28px;
                line-height: 28px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <h1>러셀 이동일지&교육점수 작성</h1>
    <button id="resetButton" onclick="resetTable()">테이블 초기화</button>

    <form id="moveForm">
        <label for="building">관:</label>
        <select id="building" required>
            <option value="">선택하세요</option>
            <option value="4-1관">4-1관</option>
            <option value="4-2관">4-2관</option>
            <option value="4-3관">4-3관</option>
            <option value="4-4관">4-4관</option>
            <option value="4-5관">4-5관</option>
        </select>

        <label for="seatNumber">좌석번호:</label>
        <select id="seatNumber" required>
            <option value="">선택하세요</option>
            <optgroup label="A~I">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="F">F</option>
                <option value="G">G</option>
                <option value="H">H</option>
                <option value="I">I</option>
            </optgroup>
        </select>

        <select id="seatNumber2" required>
            <option value="">선택하세요</option>
            <optgroup label="1~40">
                <!-- 좌석번호는 01~40까지 가능한 만큼 채우세요 -->
                <option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option>
                <option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option>
                <option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
                <option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option>
                <option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option>
                <option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option>
                <option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option>
                <option value="29">29</option><option value="30">30</option><option value="31">31</option><option value="32">32</option>
                <option value="33">33</option><option value="34">34</option><option value="35">35</option><option value="36">36</option>
                <option value="37">37</option><option value="38">38</option><option value="39">39</option><option value="40">40</option>
            </optgroup>
        </select>

        <label for="returnTime">복귀교시:</label>
        <select id="returnTime" required>
            <option value="">선택하세요</option>
            <option value="1">1교시</option>
            <option value="2">2교시</option>
            <option value="3">3교시</option>
            <option value="4">4교시</option>
            <option value="5">5교시</option>
            <option value="6">6교시</option>
            <option value="7">7교시</option>
            <option value="8">8교시</option>
            <option value="9">9교시</option>
            <option value="10">10교시</option>
            <option value="복귀안함">복귀안함</option>
        </select>

        <label for="reason">이동사유:</label>
        <select id="reason" required>
            <option value="">선택하세요</option>

            <optgroup label="일반 이동">
                <option value="화장실/정수기">화장실/정수기</option>
                <option value="튜터 질의응답">튜터 질의응답</option>
                <option value="외부 학원/과외/보충">외부 학원/과외/보충</option>
                <option value="자료수령">자료수령</option>
                <option value="가족 행사">가족 행사</option>
                <option value="병원">병원</option>
                <option value="식사">식사</option>
                <option value="기타">기타</option>
                <option value="조퇴(컨디션난조)">조퇴(컨디션난조)</option>
            </optgroup>

            <optgroup label="심야자습">
                <option value="심야자습 신청">심야자습 신청</option>
                <option value="심야자습 취소">심야자습 취소</option>
            </optgroup>

            <optgroup label="규정 위반/지도">
                <option value="지각">지각</option>
                <option value="입/퇴실 미준수">입/퇴실 미준수</option>
                <option value="핸드폰 미제출">핸드폰 미제출</option>
                <option value="전자기기 무단사용">전자기기 무단사용</option>
                <option value="핸드폰 무단사용">핸드폰 무단사용</option>
                <option value="무단이탈">무단이탈</option>
                <option value="타층/타관 무단출입">타층/타관 무단출입</option>
                <option value="핸드폰/Wifi 무단반입">핸드폰/Wifi 무단반입</option>
                <option value="무단결석">무단결석</option>
                <option value="원내대화">원내대화</option>
                <option value="무단지각">무단지각</option>
                <option value="취침강제하원">취침강제하원</option>
                <option value="음식물섭취">음식물섭취</option>
            </optgroup>
        </select>

        <div id="scoreDiv" class="score">
            <label for="score">점수 (1~10점):</label>
            <select id="score">
                <option value="1">1점</option>
                <option value="2">2점</option>
                <option value="3">3점</option>
                <option value="4">4점</option>
                <option value="5">5점</option>
                <option value="6">6점</option>
                <option value="7">7점</option>
                <option value="8">8점</option>
                <option value="9">9점</option>
                <option value="10">10점</option>
            </select>
        </div>

        <label for="otherReason" id="otherReasonLabel" style="display:none;">기타 사유:</label>
        <textarea id="otherReason" placeholder="기타 사유를 입력하세요" style="display:none; height: 100px;"></textarea>

        <button type="submit">제출</button>
    </form>

    <div id="result">
        <table id="moveList">
            <thead>
                <tr>
                    <th>관</th>
                    <th>좌석번호</th>
                    <th>복귀교시</th>
                    <th>이동사유</th>
                    <th>입력날짜</th>
                    <th>입력시간</th>
                    <th>점수</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="error" id="errorMessage">기타 사유를 입력해주세요.</div>

    <!-- 심야자습 신청/취소 팝업창 -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <h2>심야자습 신청/취소 확인</h2>
            <p>관: <span id="popupBuilding"></span></p>
            <p>좌석번호: <span id="popupSeatNumber"></span></p>
            <p>희망교시: <span id="popupReturnTime"></span></p>
            <p>사유: <span id="popupReason"></span></p>
            <div class="popup-buttons">
                <button id="popupSubmitButton">제출</button>
                <button id="popupCancelButton">취소</button>
            </div>
        </div>
    </div>

    <!-- 중앙 안내 팝업(확인 버튼 1개) -->
    <div id="alertPopup" class="popup">
        <div class="popup-content">
            <h2>안내</h2>
            <p id="alertPopupMessage" style="line-height:1.6;"></p>
            <div class="popup-buttons">
                <button id="alertPopupOkButton">확인</button>
            </div>
        </div>
    </div>

    <!-- 좌석 선택 모달 -->
    <div id="seatSelectModal">
        <h2>좌석 선택</h2>
        <div class="seat-map" id="seatMap">
            <!-- 좌석 버튼들 여기 생성 -->
        </div>
        <p>선택된 좌석: <span id="selectedSeatDisplay">없음</span></p>
        <label for="modalReturnTime">희망 복귀 교시 선택:</label>
        <select id="modalReturnTime">
            <option value="">선택하세요</option>
            <option value="9">9교시</option>
            <option value="10">10교시</option>
            <option value="복귀안함">복귀안함</option>
        </select>
        <div>
            <button id="seatModalSubmit">확인</button>
            <button id="seatModalCancel">취소</button>
        </div>
    </div>

    <script>
    let moveList = [];

    // 좌석 선택 상태
    let selectedSeat = null;

    /* ===============================
       심야자습 신청/취소 차단 설정
       - 토/일 차단
       - 특정 날짜(리스트) 차단
       =============================== */

    // ❌ 심야자습 차단 날짜(YYYY-MM-DD)
    const nightStudyBlockedDates = new Set([
        "2026-01-31",
        "2026-02-01",
        "2026-02-02"
    ]);

    // 오늘 요일 가져오기 (0:일,1:월,...6:토)
    const today = new Date();
    const todayDay = today.getDay();

    // 현재 날짜 문자열 YYYY-MM-DD
    const todayStr = today.toISOString().split('T')[0];

    // 폼, 요소 가져오기
    const moveForm = document.getElementById("moveForm");
    const buildingSelect = document.getElementById("building");
    const seatNumberSelect = document.getElementById("seatNumber");
    const seatNumber2Select = document.getElementById("seatNumber2");
    const returnTimeSelect = document.getElementById("returnTime");
    const reasonSelect = document.getElementById("reason");
    const scoreDiv = document.getElementById("scoreDiv");
    const scoreSelect = document.getElementById("score");
    const otherReasonTextarea = document.getElementById("otherReason");
    const otherReasonLabel = document.getElementById("otherReasonLabel");
    const errorMessage = document.getElementById("errorMessage");

    // 팝업 요소
    const popup = document.getElementById("popup");
    const popupBuilding = document.getElementById("popupBuilding");
    const popupSeatNumber = document.getElementById("popupSeatNumber");
    const popupReturnTime = document.getElementById("popupReturnTime");
    const popupReason = document.getElementById("popupReason");
    const popupSubmitButton = document.getElementById("popupSubmitButton");
    const popupCancelButton = document.getElementById("popupCancelButton");

    // 중앙 안내 팝업
    const alertPopup = document.getElementById("alertPopup");
    const alertPopupMessage = document.getElementById("alertPopupMessage");
    const alertPopupOkButton = document.getElementById("alertPopupOkButton");

    // 좌석 모달
    const seatSelectModal = document.getElementById("seatSelectModal");
    const seatMap = document.getElementById("seatMap");
    const selectedSeatDisplay = document.getElementById("selectedSeatDisplay");
    const modalReturnTime = document.getElementById("modalReturnTime");
    const seatModalSubmit = document.getElementById("seatModalSubmit");
    const seatModalCancel = document.getElementById("seatModalCancel");

    // 좌석 생성 함수 (A01 ~ I40)
    function createSeatMap() {
        seatMap.innerHTML = "";
        const rows = ['A', 'B', 'C', 'D', 'F', 'G', 'H', 'I']; // E 뺌 (기존 선택지와 동일)
        const cols = 40;

        for (let r = 0; r < rows.length; r++) {
            for (let c = 1; c <= cols; c++) {
                const seatId = rows[r] + (c < 10 ? "0" + c : c);
                const seatBtn = document.createElement("div");
                seatBtn.classList.add("seat");
                seatBtn.textContent = seatId;
                seatBtn.dataset.seat = seatId;

                seatBtn.addEventListener("click", () => {
                    // 이미 선택된 좌석이면 선택 해제
                    if (selectedSeat === seatId) {
                        selectedSeat = null;
                        seatBtn.classList.remove("selected");
                        selectedSeatDisplay.textContent = "없음";
                    } else {
                        // 다른 좌석 선택시 기존 선택 제거
                        const prevSelected = seatMap.querySelector(".seat.selected");
                        if (prevSelected) prevSelected.classList.remove("selected");

                        selectedSeat = seatId;
                        seatBtn.classList.add("selected");
                        selectedSeatDisplay.textContent = seatId;
                    }
                });

                seatMap.appendChild(seatBtn);
            }
        }
    }

    // 센터 팝업 경고 함수
    function showCenterAlert(message) {
        alertPopupMessage.textContent = message;
        alertPopup.style.display = "block";
    }

    alertPopupOkButton.addEventListener("click", () => {
        alertPopup.style.display = "none";
    });

    // 제출 시 점수 보이기/숨기기, 기타 사유 textarea 보이기/숨기기
    reasonSelect.addEventListener("change", () => {
        const val = reasonSelect.value;
        if (val === "기타") {
            otherReasonTextarea.style.display = "block";
            otherReasonLabel.style.display = "block";
            scoreDiv.style.display = "none";
        } else if (val === "심야자습 신청" || val === "심야자습 취소") {
            otherReasonTextarea.style.display = "none";
            otherReasonLabel.style.display = "none";
            scoreDiv.style.display = "none";
        } else if (val === "") {
            otherReasonTextarea.style.display = "none";
            otherReasonLabel.style.display = "none";
            scoreDiv.style.display = "none";
        } else {
            otherReasonTextarea.style.display = "none";
            otherReasonLabel.style.display = "none";
            scoreDiv.style.display = "block";
        }
    });

    // 테이블 초기화 함수
    function resetTable() {
        if (confirm("테이블을 초기화하시겠습니까?")) {
            moveList = [];
            renderTable();
        }
    }

    // 테이블 렌더링 함수
    function renderTable() {
        const tbody = document.querySelector("#moveList tbody");
        tbody.innerHTML = "";

        moveList.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${item.building}</td>
                <td>${item.seatNumber}</td>
                <td>${item.returnTime}</td>
                <td>${item.reason}</td>
                <td>${item.inputDate}</td>
                <td>${item.inputTime}</td>
                <td>${item.score || ""}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 제출 이벤트 처리 (심야자습 선택시 좌석 모달부터 띄우도록 수정)
    moveForm.addEventListener("submit", function(event) {
        event.preventDefault();

        // 날짜 차단 및 요일 차단 검사 (심야자습 신청/취소 시만)
        const reasonVal = reasonSelect.value;
        if (reasonVal === "심야자습 신청" || reasonVal === "심야자습 취소") {
            if (todayDay === 0 || todayDay === 6) {
                showCenterAlert("토요일과 일요일에는 심야자습 신청이 불가능합니다.");
                return;
            }
            if (nightStudyBlockedDates.has(todayStr)) {
                showCenterAlert("오늘은 심야자습 신청이 불가능한 날짜입니다.");
                return;
            }

            // 좌석 모달 띄우기
            createSeatMap();
            selectedSeat = null;
            selectedSeatDisplay.textContent = "없음";
            modalReturnTime.value = "";
            seatSelectModal.style.display = "block";

            // 제출 중단 - 좌석 모달에서 다시 제출 진행
            return;
        }

        // 일반 제출 처리
        const building = buildingSelect.value;
        const seatNum1 = seatNumberSelect.value;
        const seatNum2 = seatNumber2Select.value;
        const seatNumber = seatNum1 + seatNum2;
        const returnTime = returnTimeSelect.value;
        const reason = reasonVal;

        // 기타 사유 검사
        if (reason === "기타" && otherReasonTextarea.value.trim() === "") {
            errorMessage.style.display = "block";
            setTimeout(() => errorMessage.style.display = "none", 1500);
            return;
        }

        const scoreVal = scoreSelect.value;

        // 현재 시간, 날짜
        const now = new Date();
        const inputDate = now.toISOString().slice(0, 10);
        const inputTime = now.toTimeString().slice(0, 8);

        const entry = {
            building,
            seatNumber,
            returnTime,
            reason: reason === "기타" ? otherReasonTextarea.value.trim() : reason,
            inputDate,
            inputTime,
            score: scoreVal
        };

        moveList.push(entry);
        renderTable();

        // 제출 후 초기화
        moveForm.reset();
        otherReasonTextarea.style.display = "none";
        otherReasonLabel.style.display = "none";
        scoreDiv.style.display = "none";
    });

    // 좌석 모달 제출 버튼 클릭 시 처리
    seatModalSubmit.addEventListener("click", () => {
        const returnTimeVal = modalReturnTime.value;

        if (!selectedSeat) {
            showCenterAlert("좌석을 선택해주세요.");
            return;
        }
        if (!returnTimeVal) {
            showCenterAlert("희망 복귀 교시를 선택해주세요.");
            return;
        }

        // 좌석번호 분리 (글자+숫자) -> 폼에 맞게 나누기
        const seatLetter = selectedSeat.charAt(0);
        const seatNum = selectedSeat.slice(1);

        // 팝업에 정보 채우기
        popupBuilding.textContent = buildingSelect.value;
        popupSeatNumber.textContent = selectedSeat;
        popupReturnTime.textContent = returnTimeVal;
        popupReason.textContent = reasonSelect.value;

        // 좌석번호 폼에도 세팅 (보조)
        seatNumberSelect.value = seatLetter;
        seatNumber2Select.value = seatNum;
        returnTimeSelect.value = returnTimeVal;

        // 좌석 모달 닫고 팝업 열기
        seatSelectModal.style.display = "none";
        popup.style.display = "block";
    });

    // 좌석 모달 취소 버튼 클릭 시 닫기
    seatModalCancel.addEventListener("click", () => {
        seatSelectModal.style.display = "none";
    });

    // 팝업 제출 버튼 클릭 시 (최종 제출)
    popupSubmitButton.addEventListener("click", () => {
        // 폼 값 다시 읽기
        const building = buildingSelect.value;
        const seatNum1 = seatNumberSelect.value;
        const seatNum2 = seatNumber2Select.value;
        const seatNumber = seatNum1 + seatNum2;
        const returnTime = returnTimeSelect.value;
        const reason = reasonSelect.value;

        // 점수는 심야자습 시 비워둠
        const scoreVal = "";

        const now = new Date();
        const inputDate = now.toISOString().slice(0, 10);
        const inputTime = now.toTimeString().slice(0, 8);

        const entry = {
            building,
            seatNumber,
            returnTime,
            reason,
            inputDate,
            inputTime,
            score: scoreVal
        };

        moveList.push(entry);
        renderTable();

        // 팝업 닫기
        popup.style.display = "none";

        // 폼 초기화
        moveForm.reset();
        scoreDiv.style.display = "none";
        otherReasonTextarea.style.display = "none";
        otherReasonLabel.style.display = "none";

        selectedSeat = null;
        selectedSeatDisplay.textContent = "없음";
    });

    // 팝업 취소 버튼 클릭 시 닫기
    popupCancelButton.addEventListener("click", () => {
        popup.style.display = "none";
    });

    </script>
</body>
</html>
